openapi: 3.1.0
servers:
  - url: /
info:
  version: 1.0.0
  title: Playerok OpenAPI Schema
  description: Playerok OpenAPI Schema
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  # ── IDP: Auth ──────────────────────────────────────────
  /auth/request-otp:
    post:
      $ref: "./endpoints/idp/request-otp.yaml#/requestOtp"
  /auth/verify-otp:
    post:
      $ref: "./endpoints/idp/verify-otp.yaml#/verifyOtp"
  /auth/refresh:
    get:
      $ref: "./endpoints/idp/refresh.yaml#/refresh"
  /auth/complete-profile:
    post:
      $ref: "./endpoints/idp/complete-profile.yaml#/completeProfile"
  /auth/logout:
    post:
      $ref: "./endpoints/idp/logout.yaml#/logout"

  # ── IDP: Profile ───────────────────────────────────────
  /me:
    get:
      $ref: "./endpoints/idp/me.yaml#/getMe"
  /me/profile:
    patch:
      $ref: "./endpoints/idp/update-profile.yaml#/updateProfile"
  /me/permissions:
    get:
      $ref: "./endpoints/idp/get-my-permissions.yaml#/getMyPermissions"

  # ── IDP: Sessions ──────────────────────────────────────
  /me/sessions:
    get:
      $ref: "./endpoints/idp/get-sessions.yaml#/getMeSessions"
    delete:
      $ref: "./endpoints/idp/delete-all-sessions.yaml#/deleteAllSessions"
  /me/sessions/{sessionId}:
    delete:
      $ref: "./endpoints/idp/delete-session.yaml#/deleteSession"

  # ── IDP: Roles ───────────────────────────────────────
  /roles:
    get:
      $ref: "./endpoints/idp/get-roles.yaml#/getRoles"
    post:
      $ref: "./endpoints/idp/create-role.yaml#/createRole"
  /roles/permissions-schema:
    get:
      $ref: "./endpoints/idp/get-permissions-schema.yaml#/getPermissionsSchema"
  /roles/{roleId}:
    get:
      $ref: "./endpoints/idp/get-role.yaml#/getRole"
    patch:
      $ref: "./endpoints/idp/update-role.yaml#/updateRole"
    delete:
      $ref: "./endpoints/idp/delete-role.yaml#/deleteRole"
  /users/{userId}/role:
    patch:
      $ref: "./endpoints/idp/update-user-role.yaml#/updateUserRole"

  # ── IDP: Admin ──────────────────────────────────────────
  /admin/users:
    get:
      $ref: "./endpoints/idp/admin-users-search.yaml#/searchAdminUsers"
  /admin/users/{userId}/block:
    post:
      $ref: "./endpoints/idp/block-user.yaml#/blockUser"
  /admin/users/{userId}/unblock:
    post:
      $ref: "./endpoints/idp/block-user.yaml#/unblockUser"
  /admin/users/{userId}/sessions:
    get:
      $ref: "./endpoints/idp/admin-sessions.yaml#/getAdminUserSessions"
    delete:
      $ref: "./endpoints/idp/admin-sessions.yaml#/deleteAllAdminSessions"
  /admin/users/{userId}/sessions/{sessionId}:
    delete:
      $ref: "./endpoints/idp/admin-sessions.yaml#/deleteAdminSession"

  # ── Cities ────────────────────────────────────────────
  /cities:
    get:
      $ref: "./endpoints/cities/cities.yaml#/getCities"

  # ── Media ──────────────────────────────────────────────
  /media/image/upload-request:
    post:
      $ref: "./endpoints/media/media-upload-request.yaml#/mediaUploadRequest"
  /media/image/upload-complete:
    post:
      $ref: "./endpoints/media/media-image-upload-complete.yaml#/mediaImageUploadComplete"
  /media/video/upload-init:
    post:
      $ref: "./endpoints/media/media-video-upload-init.yaml#/mediaVideoUploadInit"
  /media/video/upload-complete:
    post:
      $ref: "./endpoints/media/media-video-upload-complete.yaml#/mediaVideoUploadComplete"
  /media/video/preview/{mediaId}:
    get:
      $ref: "./endpoints/media/media-video-preview.yaml#/mediaVideoPreview"
  /media/preview/{mediaId}:
    get:
      $ref: "./endpoints/media/media-preview.yaml#/mediaPreview"

  # ── Banners ────────────────────────────────────────────
  /banners:
    get:
      $ref: "./endpoints/banners/banners.yaml#/getBanners"

  # ── Discovery ────────────────────────────────────────
  /categories:
    get:
      $ref: "./endpoints/discovery/categories.yaml#/getCategories"
  /categories/{id}/items:
    get:
      $ref: "./endpoints/discovery/categories.yaml#/getCategoryItems"
  /categories/{id}/filters:
    get:
      $ref: "./endpoints/discovery/categories.yaml#/getCategoryFilters"
  /feed:
    get:
      $ref: "./endpoints/discovery/feed.yaml#/getFeed"
  /search:
    get:
      $ref: "./endpoints/discovery/search.yaml#/searchItems"
  /liked-items:
    get:
      $ref: "./endpoints/discovery/liked-items.yaml#/getLikedItems"
  /items/{itemId}:
    get:
      $ref: "./endpoints/discovery/item-detail.yaml#/getDiscoveryItemDetail"
  /items/{itemId}/like:
    post:
      $ref: "./endpoints/discovery/like-item.yaml#/likeItem"
    delete:
      $ref: "./endpoints/discovery/like-item.yaml#/unlikeItem"
  /items/liked-status:
    post:
      $ref: "./endpoints/discovery/liked-status.yaml#/checkLikedStatus"

  # ── Interactions ─────────────────────────────────────────
  /interactions/views:
    post:
      $ref: "./endpoints/interactions/interactions.yaml#/recordViews"
  /interactions/click:
    post:
      $ref: "./endpoints/interactions/interactions.yaml#/recordClick"
  /interactions/show-contacts:
    post:
      $ref: "./endpoints/interactions/interactions.yaml#/recordShowContacts"
  /interactions/contact-click:
    post:
      $ref: "./endpoints/interactions/interactions.yaml#/recordContactClick"

  # ── Reviews ──────────────────────────────────────────────
  /reviews:
    get:
      $ref: "./endpoints/reviews/reviews.yaml#/getReviewsByTarget"
    post:
      $ref: "./endpoints/reviews/reviews.yaml#/createReview"
  /reviews/my:
    get:
      $ref: "./endpoints/reviews/reviews.yaml#/getMyReviews"
  /reviews/by-ids:
    post:
      $ref: "./endpoints/reviews/reviews.yaml#/getReviewsByIds"
  /reviews/organization/{orgId}:
    get:
      $ref: "./endpoints/reviews/reviews.yaml#/getOrganizationReviews"
  /reviews/{reviewId}:
    get:
      $ref: "./endpoints/reviews/reviews.yaml#/getReviewById"
    patch:
      $ref: "./endpoints/reviews/reviews.yaml#/editReview"
    delete:
      $ref: "./endpoints/reviews/reviews.yaml#/deleteReview"
  /reviews/{reviewId}/approve:
    post:
      $ref: "./endpoints/reviews/reviews.yaml#/approveReview"
  /reviews/{reviewId}/reject:
    post:
      $ref: "./endpoints/reviews/reviews.yaml#/rejectReview"
  /reviews/{reviewId}/reply:
    post:
      $ref: "./endpoints/reviews/reviews.yaml#/replyToReview"
  /reviews/{reviewId}/dispute:
    post:
      $ref: "./endpoints/reviews/reviews.yaml#/disputeReview"
  /reviews/{reviewId}/resolve-dispute:
    post:
      $ref: "./endpoints/reviews/reviews.yaml#/resolveDispute"

  # ── CMS: Categories ──────────────────────────────────────
  /cms/categories:
    get:
      $ref: "./endpoints/cms/categories.yaml#/getCmsCategories"
    post:
      $ref: "./endpoints/cms/categories.yaml#/createCmsCategory"
  /cms/categories/{id}:
    get:
      $ref: "./endpoints/cms/categories.yaml#/getCmsCategoryDetail"
    patch:
      $ref: "./endpoints/cms/categories.yaml#/updateCmsCategory"
  /cms/categories/{id}/publish:
    post:
      $ref: "./endpoints/cms/categories.yaml#/publishCmsCategory"
  /cms/categories/{id}/unpublish:
    post:
      $ref: "./endpoints/cms/categories.yaml#/unpublishCmsCategory"
  /cms/categories/{id}/attributes:
    post:
      $ref: "./endpoints/cms/categories.yaml#/addCmsCategoryAttribute"
  /cms/categories/{id}/attributes/{attributeId}:
    delete:
      $ref: "./endpoints/cms/categories.yaml#/removeCmsCategoryAttribute"

  # ── CMS: Item Types ──────────────────────────────────────
  /cms/item-types:
    get:
      $ref: "./endpoints/cms/item-types.yaml#/getCmsItemTypes"
    post:
      $ref: "./endpoints/cms/item-types.yaml#/createCmsItemType"
  /cms/item-types/{id}:
    patch:
      $ref: "./endpoints/cms/item-types.yaml#/updateCmsItemType"

  # ── Organization: Admin ───────────────────────────────
  /admin/organizations:
    get:
      $ref: "./endpoints/organization/admin-organizations-search.yaml#/searchAdminOrganizations"
    post:
      $ref: "./endpoints/organization/admin-organizations.yaml#/adminCreateOrganization"
  /admin/organizations/{orgId}/items:
    post:
      $ref: "./endpoints/organization/admin-organizations.yaml#/adminCreateItem"
  /admin/organizations/{id}/claim-token:
    get:
      $ref: "./endpoints/organization/admin-organizations.yaml#/getClaimToken"
  /admin/organizations/{id}/regenerate-token:
    post:
      $ref: "./endpoints/organization/admin-organizations.yaml#/regenerateClaimToken"

  # ── Organization: CRUD ────────────────────────────────
  /organizations:
    post:
      $ref: "./endpoints/organization/organizations.yaml#/createOrganization"
  /organizations/claim:
    post:
      $ref: "./endpoints/organization/organizations.yaml#/claimOrganization"
  /organizations/{id}:
    get:
      $ref: "./endpoints/organization/organizations.yaml#/getOrganization"
    patch:
      $ref: "./endpoints/organization/organizations.yaml#/updateInfoDraft"
    delete:
      $ref: "./endpoints/organization/organizations.yaml#/deleteOrganization"
  /organizations/{id}/submit-for-moderation:
    post:
      $ref: "./endpoints/organization/organizations.yaml#/submitInfoForModeration"
  /organizations/{id}/approve-moderation:
    post:
      $ref: "./endpoints/organization/organizations.yaml#/approveInfoModeration"
  /organizations/{id}/reject-moderation:
    post:
      $ref: "./endpoints/organization/organizations.yaml#/rejectInfoModeration"
  /organizations/{id}/discard-draft-changes:
    post:
      $ref: "./endpoints/organization/organizations.yaml#/discardInfoDraftChanges"
  /organizations/{id}/unpublish:
    post:
      $ref: "./endpoints/organization/organizations.yaml#/unpublishOrganization"

  # ── Organization: Employees ───────────────────────────
  /organizations/{id}/employees:
    get:
      $ref: "./endpoints/organization/employees.yaml#/getEmployees"
    post:
      $ref: "./endpoints/organization/employees.yaml#/inviteEmployee"
  /organizations/{id}/employees/{userId}:
    delete:
      $ref: "./endpoints/organization/employees.yaml#/removeEmployee"
    patch:
      $ref: "./endpoints/organization/employees.yaml#/changeEmployeeRole"
  /organizations/{id}/transfer-ownership:
    post:
      $ref: "./endpoints/organization/employees.yaml#/transferOwnership"

  # ── Organization: Roles ───────────────────────────────
  /organizations/{id}/roles:
    get:
      $ref: "./endpoints/organization/roles.yaml#/getRoles"
    post:
      $ref: "./endpoints/organization/roles.yaml#/createEmployeeRole"
  /organizations/{id}/roles/{roleId}:
    patch:
      $ref: "./endpoints/organization/roles.yaml#/updateEmployeeRole"
    delete:
      $ref: "./endpoints/organization/roles.yaml#/deleteEmployeeRole"

  # ── Organization: Items ───────────────────────────────
  /organizations/{orgId}/items:
    post:
      $ref: "./endpoints/organization/items.yaml#/createItem"
    get:
      $ref: "./endpoints/organization/items.yaml#/getItems"
  /organizations/{orgId}/items/{itemId}:
    get:
      $ref: "./endpoints/organization/items.yaml#/getItemDetail"
    patch:
      $ref: "./endpoints/organization/items.yaml#/updateItemDraft"
    delete:
      $ref: "./endpoints/organization/items.yaml#/deleteItemDraft"
  /organizations/{orgId}/items/{itemId}/submit-for-moderation:
    post:
      $ref: "./endpoints/organization/items.yaml#/submitItemForModeration"
  /organizations/{orgId}/items/{itemId}/approve-moderation:
    post:
      $ref: "./endpoints/organization/items.yaml#/approveItemModeration"
  /organizations/{orgId}/items/{itemId}/reject-moderation:
    post:
      $ref: "./endpoints/organization/items.yaml#/rejectItemModeration"
  /organizations/{orgId}/items/{itemId}/unpublish:
    post:
      $ref: "./endpoints/organization/items.yaml#/unpublishItem"

  # ── Tickets: Admin Boards ──────────────────────────────
  /admin/boards:
    get:
      $ref: "./endpoints/tickets/boards.yaml#/getAdminBoards"
    post:
      $ref: "./endpoints/tickets/boards.yaml#/createAdminBoard"
  /admin/boards/my:
    get:
      $ref: "./endpoints/tickets/boards.yaml#/getAdminMyBoards"
  /admin/boards/{boardId}:
    get:
      $ref: "./endpoints/tickets/boards.yaml#/getAdminBoardDetail"
    patch:
      $ref: "./endpoints/tickets/boards.yaml#/updateAdminBoard"
    delete:
      $ref: "./endpoints/tickets/boards.yaml#/deleteAdminBoard"
  /admin/boards/{boardId}/subscriptions:
    post:
      $ref: "./endpoints/tickets/boards.yaml#/addAdminBoardSubscription"
  /admin/boards/{boardId}/subscriptions/{subId}:
    delete:
      $ref: "./endpoints/tickets/boards.yaml#/removeAdminBoardSubscription"
  /admin/boards/{boardId}/members:
    post:
      $ref: "./endpoints/tickets/boards.yaml#/addAdminBoardMember"
  /admin/boards/{boardId}/members/{userId}:
    delete:
      $ref: "./endpoints/tickets/boards.yaml#/removeAdminBoardMember"
  /admin/boards/{boardId}/automation:
    put:
      $ref: "./endpoints/tickets/boards.yaml#/addAdminBoardAutomation"
  /admin/boards/{boardId}/automation/{automationId}:
    delete:
      $ref: "./endpoints/tickets/boards.yaml#/removeAdminBoardAutomation"
  /admin/boards/{boardId}/close-subscriptions:
    post:
      $ref: "./endpoints/tickets/boards.yaml#/addAdminBoardCloseSubscription"
  /admin/boards/{boardId}/close-subscriptions/{subId}:
    delete:
      $ref: "./endpoints/tickets/boards.yaml#/removeAdminBoardCloseSubscription"
  /admin/boards/{boardId}/redirect-subscriptions:
    post:
      $ref: "./endpoints/tickets/boards.yaml#/addAdminBoardRedirectSubscription"
  /admin/boards/{boardId}/redirect-subscriptions/{subId}:
    delete:
      $ref: "./endpoints/tickets/boards.yaml#/removeAdminBoardRedirectSubscription"

  # ── Tickets: Admin Tickets ─────────────────────────────
  /admin/tickets:
    get:
      $ref: "./endpoints/tickets/tickets.yaml#/getAdminTickets"
    post:
      $ref: "./endpoints/tickets/tickets.yaml#/createAdminTicket"
  /admin/tickets/my:
    get:
      $ref: "./endpoints/tickets/tickets.yaml#/getAdminMyTickets"
  /admin/tickets/unassign-all:
    post:
      $ref: "./endpoints/tickets/tickets.yaml#/unassignAllAdminTickets"
  /admin/tickets/{ticketId}:
    get:
      $ref: "./endpoints/tickets/tickets.yaml#/getAdminTicketDetail"
  /admin/tickets/{ticketId}/assign:
    post:
      $ref: "./endpoints/tickets/tickets.yaml#/assignAdminTicket"
  /admin/tickets/{ticketId}/reassign:
    post:
      $ref: "./endpoints/tickets/tickets.yaml#/reassignAdminTicket"
  /admin/tickets/{ticketId}/unassign:
    post:
      $ref: "./endpoints/tickets/tickets.yaml#/unassignAdminTicket"
  /admin/tickets/{ticketId}/move:
    post:
      $ref: "./endpoints/tickets/tickets.yaml#/moveAdminTicket"
  /admin/tickets/{ticketId}/done:
    post:
      $ref: "./endpoints/tickets/tickets.yaml#/markAdminTicketDone"
  /admin/tickets/{ticketId}/reopen:
    post:
      $ref: "./endpoints/tickets/tickets.yaml#/reopenAdminTicket"
  /admin/tickets/{ticketId}/comments:
    post:
      $ref: "./endpoints/tickets/tickets.yaml#/addAdminTicketComment"
  # ── Tickets: SSE ───────────────────────────────────────
  /admin/boards/{boardId}/stream:
    get:
      $ref: "./endpoints/tickets/stream.yaml#/getAdminBoardStream"
  # ── Tickets: Admin Triggers ────────────────────────────
  /admin/boards/triggers:
    get:
      $ref: "./endpoints/tickets/triggers.yaml#/getAdminTicketTriggers"
  /admin/boards/filters:
    get:
      $ref: "./endpoints/tickets/triggers.yaml#/getAdminTicketFilters"
