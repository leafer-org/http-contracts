openapi: 3.1.0
servers:
  - url: /
info:
  version: 1.0.0
  title: Playerok OpenAPI Schema
  description: Playerok OpenAPI Schema
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  # ── IDP: Auth ──────────────────────────────────────────
  /auth/request-otp:
    post:
      $ref: "./endpoints/idp/request-otp.yaml#/requestOtp"
  /auth/verify-otp:
    post:
      $ref: "./endpoints/idp/verify-otp.yaml#/verifyOtp"
  /auth/refresh:
    get:
      $ref: "./endpoints/idp/refresh.yaml#/refresh"
  /auth/complete-profile:
    post:
      $ref: "./endpoints/idp/complete-profile.yaml#/completeProfile"
  /auth/logout:
    post:
      $ref: "./endpoints/idp/logout.yaml#/logout"

  # ── IDP: Profile ───────────────────────────────────────
  /me:
    get:
      $ref: "./endpoints/idp/me.yaml#/getMe"
  /me/profile:
    patch:
      $ref: "./endpoints/idp/update-profile.yaml#/updateProfile"

  # ── IDP: Sessions ──────────────────────────────────────
  /me/sessions:
    get:
      $ref: "./endpoints/idp/get-sessions.yaml#/getMeSessions"
    delete:
      $ref: "./endpoints/idp/delete-all-sessions.yaml#/deleteAllSessions"
  /me/sessions/{sessionId}:
    delete:
      $ref: "./endpoints/idp/delete-session.yaml#/deleteSession"

  # ── IDP: Roles ───────────────────────────────────────
  /roles:
    get:
      $ref: "./endpoints/idp/get-roles.yaml#/getRoles"
    post:
      $ref: "./endpoints/idp/create-role.yaml#/createRole"
  /roles/permissions-schema:
    get:
      $ref: "./endpoints/idp/get-permissions-schema.yaml#/getPermissionsSchema"
  /roles/{roleId}:
    get:
      $ref: "./endpoints/idp/get-role.yaml#/getRole"
    patch:
      $ref: "./endpoints/idp/update-role.yaml#/updateRole"
    delete:
      $ref: "./endpoints/idp/delete-role.yaml#/deleteRole"
  /users/{userId}/role:
    patch:
      $ref: "./endpoints/idp/update-user-role.yaml#/updateUserRole"

  # ── IDP: Admin ──────────────────────────────────────────
  /admin/users:
    get:
      $ref: "./endpoints/idp/admin-users-search.yaml#/searchAdminUsers"

  # ── Media ──────────────────────────────────────────────
  /media/upload-request:
    post:
      $ref: "./endpoints/media/media-upload-request.yaml#/mediaUploadRequest"
  /media/confirm-upload:
    post:
      $ref: "./endpoints/media/media-confirm-upload.yaml#/mediaConfirmUpload"
  /media/preview/{mediaId}:
    get:
      $ref: "./endpoints/media/media-preview.yaml#/mediaPreview"

  # ── Banners ────────────────────────────────────────────
  /banners:
    get:
      $ref: "./endpoints/banners/banners.yaml#/getBanners"

  # ── Discovery ────────────────────────────────────────
  /categories:
    get:
      $ref: "./endpoints/discovery/categories.yaml#/getCategories"
  /categories/{id}/items:
    get:
      $ref: "./endpoints/discovery/categories.yaml#/getCategoryItems"
  /categories/{id}/filters:
    get:
      $ref: "./endpoints/discovery/categories.yaml#/getCategoryFilters"
  /feed:
    get:
      $ref: "./endpoints/discovery/feed.yaml#/getFeed"
  /search:
    get:
      $ref: "./endpoints/discovery/search.yaml#/searchItems"
  /liked-items:
    get:
      $ref: "./endpoints/discovery/liked-items.yaml#/getLikedItems"
  /items/{itemId}/like:
    post:
      $ref: "./endpoints/discovery/like-item.yaml#/likeItem"
    delete:
      $ref: "./endpoints/discovery/like-item.yaml#/unlikeItem"

  # ── CMS: Categories ──────────────────────────────────────
  /cms/categories:
    get:
      $ref: "./endpoints/cms/categories.yaml#/getCmsCategories"
    post:
      $ref: "./endpoints/cms/categories.yaml#/createCmsCategory"
  /cms/categories/{id}:
    get:
      $ref: "./endpoints/cms/categories.yaml#/getCmsCategoryDetail"
    patch:
      $ref: "./endpoints/cms/categories.yaml#/updateCmsCategory"
  /cms/categories/{id}/publish:
    post:
      $ref: "./endpoints/cms/categories.yaml#/publishCmsCategory"
  /cms/categories/{id}/unpublish:
    post:
      $ref: "./endpoints/cms/categories.yaml#/unpublishCmsCategory"
  /cms/categories/{id}/attributes:
    post:
      $ref: "./endpoints/cms/categories.yaml#/addCmsCategoryAttribute"
  /cms/categories/{id}/attributes/{attributeId}:
    delete:
      $ref: "./endpoints/cms/categories.yaml#/removeCmsCategoryAttribute"

  # ── CMS: Item Types ──────────────────────────────────────
  /cms/item-types:
    get:
      $ref: "./endpoints/cms/item-types.yaml#/getCmsItemTypes"
    post:
      $ref: "./endpoints/cms/item-types.yaml#/createCmsItemType"
  /cms/item-types/{id}:
    patch:
      $ref: "./endpoints/cms/item-types.yaml#/updateCmsItemType"

  # ── Organization: CRUD ────────────────────────────────
  /organizations:
    post:
      $ref: "./endpoints/organization/organizations.yaml#/createOrganization"
  /organizations/{id}:
    get:
      $ref: "./endpoints/organization/organizations.yaml#/getOrganization"
    patch:
      $ref: "./endpoints/organization/organizations.yaml#/updateInfoDraft"
  /organizations/{id}/submit-for-moderation:
    post:
      $ref: "./endpoints/organization/organizations.yaml#/submitInfoForModeration"

  # ── Organization: Employees ───────────────────────────
  /organizations/{id}/employees:
    get:
      $ref: "./endpoints/organization/employees.yaml#/getEmployees"
    post:
      $ref: "./endpoints/organization/employees.yaml#/inviteEmployee"
  /organizations/{id}/employees/{userId}:
    delete:
      $ref: "./endpoints/organization/employees.yaml#/removeEmployee"
    patch:
      $ref: "./endpoints/organization/employees.yaml#/changeEmployeeRole"
  /organizations/{id}/transfer-ownership:
    post:
      $ref: "./endpoints/organization/employees.yaml#/transferOwnership"

  # ── Organization: Roles ───────────────────────────────
  /organizations/{id}/roles:
    get:
      $ref: "./endpoints/organization/roles.yaml#/getRoles"
    post:
      $ref: "./endpoints/organization/roles.yaml#/createEmployeeRole"
  /organizations/{id}/roles/{roleId}:
    patch:
      $ref: "./endpoints/organization/roles.yaml#/updateEmployeeRole"
    delete:
      $ref: "./endpoints/organization/roles.yaml#/deleteEmployeeRole"

  # ── Organization: Items ───────────────────────────────
  /organizations/{orgId}/items:
    post:
      $ref: "./endpoints/organization/items.yaml#/createItem"
    get:
      $ref: "./endpoints/organization/items.yaml#/getItems"
  /organizations/{orgId}/items/{itemId}:
    get:
      $ref: "./endpoints/organization/items.yaml#/getItemDetail"
    patch:
      $ref: "./endpoints/organization/items.yaml#/updateItemDraft"
    delete:
      $ref: "./endpoints/organization/items.yaml#/deleteItemDraft"
  /organizations/{orgId}/items/{itemId}/submit-for-moderation:
    post:
      $ref: "./endpoints/organization/items.yaml#/submitItemForModeration"
  /organizations/{orgId}/items/{itemId}/unpublish:
    post:
      $ref: "./endpoints/organization/items.yaml#/unpublishItem"
