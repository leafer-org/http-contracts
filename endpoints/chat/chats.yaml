  security: [{ bearerAuth: [] }]
  parameters:
    - { name: q, in: query, required: true, schema: { type: string } }
    - { name: cursor, in: query, schema: { type: string } }
    - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 50 } }
    - { name: slotKind, in: query, schema: { type: string, enum: [organization, support] } }
    - { name: orgId, in: query, schema: { type: string } }
    - { name: status, in: query, schema: { type: string, enum: [open, closed, blocked] } }
    - { name: from, in: query, schema: { type: string, format: date-time } }
    - { name: to, in: query, schema: { type: string, format: date-time } }
  responses:
    "200":
      description: Результаты
      content:
        application/json:
          schema: { $ref: "#/components/SearchResultsGlobal" }
    "400": { $ref: "#/components/DomainError" }
    "403": { $ref: "#/components/DomainError" }

operatorSearchInChat:
  operationId: operatorSearchInChat
  tags: [chat]
  summary: Поиск в пределах одного чата (оператор)
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
    - { name: q, in: query, required: true, schema: { type: string } }
    - { name: cursor, in: query, schema: { type: string } }
    - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 50 } }
  responses:
    "200":
      description: Результаты
      content:
        application/json:
          schema: { $ref: "#/components/SearchResultsInChat" }
    "400": { $ref: "#/components/DomainError" }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }

# ─────────────────────────────────────────────────────────────────────────
# Operator-side endpoints
# ─────────────────────────────────────────────────────────────────────────

openChatAsSupport:
  operationId: openChatAsSupport
  tags: [chat]
  summary: Админ инициирует чат с user или организацией
  security: [{ bearerAuth: [] }]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [target, message]
          properties:
            target:
              type: object
              oneOf:
                - { type: object, required: [kind, userId], properties: { kind: { type: string, enum: [user] }, userId: { type: string } } }
                - { type: object, required: [kind, organizationId], properties: { kind: { type: string, enum: [organization] }, organizationId: { type: string } } }
            message:
              type: object
              required: [text, mediaIds]
              properties:
                text: { type: string, nullable: true }
                mediaIds: { type: array, items: { type: string } }
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema: { $ref: "#/components/ChatOpenResponse" }
    "400": { $ref: "#/components/DomainError" }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }
    "409": { $ref: "#/components/DomainError" }

sendMessageAsOperator:
  operationId: sendMessageAsOperator
  tags: [chat]
  summary: Оператор отправляет сообщение в чат
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
    - { name: claim, in: query, schema: { type: boolean } }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [text, mediaIds]
          properties:
            text: { type: string, nullable: true }
            mediaIds: { type: array, items: { type: string } }
  responses:
    "200":
      description: Отправлено
      content:
        application/json:
          schema:
            type: object
            required: [messageId, claimed, reopened]
            properties:
              messageId: { type: string }
              claimed: { type: boolean }
              reopened: { type: boolean }
    "400": { $ref: "#/components/DomainError" }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }
    "409": { $ref: "#/components/DomainError" }

claimChatSlot:
  operationId: claimChatSlot
  tags: [chat]
  summary: Взять (claim) слот участника
  security: [{ bearerAuth: [] }]
  parameters:
