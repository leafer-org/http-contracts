    "404": { $ref: "#/components/DomainError" }
    "409": { $ref: "#/components/DomainError" }

releaseChatSlot:
  operationId: releaseChatSlot
  tags: [chat]
  summary: Снять claim со слота
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
    - { name: participantId, in: path, required: true, schema: { type: string } }
  responses:
    "204": { description: OK }
    "400": { $ref: "#/components/DomainError" }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }
    "409": { $ref: "#/components/DomainError" }

reassignChatSlot:
  operationId: reassignChatSlot
  tags: [chat]
  summary: Переназначить слот другому оператору
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
    - { name: participantId, in: path, required: true, schema: { type: string } }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [assignedUserId]
          properties:
            assignedUserId: { type: string }
  responses:
    "204": { description: OK }
    "400": { $ref: "#/components/DomainError" }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }

blockChat:
  operationId: blockChat
  tags: [chat]
  summary: Блокировать чат
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            reason: { type: string, nullable: true }
  responses:
    "204": { description: OK }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }
    "409": { $ref: "#/components/DomainError" }

unblockChat:
  operationId: unblockChat
  tags: [chat]
  summary: Разблокировать чат
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
  responses:
    "204": { description: OK }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }
    "409": { $ref: "#/components/DomainError" }

closeChat:
  operationId: closeChat
  tags: [chat]
  summary: Закрыть чат
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            reason: { type: string, nullable: true }
  responses:
    "204": { description: OK }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }
    "409": { $ref: "#/components/DomainError" }

listAdminChats:
  operationId: listAdminChats
  tags: [chat]
  summary: Чаты оператора (admin/employee)
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: slotKind, in: query, schema: { type: string, enum: [organization, support] } }
    - { name: orgId, in: query, schema: { type: string } }
    - { name: status, in: query, schema: { type: string, enum: [open, closed, blocked] } }
    - { name: assignedToMe, in: query, schema: { type: boolean } }
    - { name: unassigned, in: query, schema: { type: boolean } }
    - { name: from, in: query, schema: { type: integer, minimum: 0 } }
    - { name: size, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
  responses:
    "200":
      description: Список
      content:
        application/json:
          schema: { $ref: "#/components/ChatList" }

# ─────────────────────────────────────────────────────────────────────────
# Reusable components
# ─────────────────────────────────────────────────────────────────────────

components:
  ChatOpenResponse:
    type: object
    required: [chatId, reused, reopened]
    properties:
      chatId: { type: string }
      reused: { type: boolean }
      reopened: { type: boolean }

  ChatListItem:
    type: object
    required: [chatId, status, participants, lastMessage, myUnreadCount, updatedAt]
    properties:
      chatId: { type: string }
      status: { type: string, enum: [open, closed, blocked] }
      participants:
        type: array
        items:
          type: object
          required: [id, kind, subjectId, assignedUserId]
          properties:
            id: { type: string }
            kind: { type: string, enum: [user, organization, support] }
            subjectId: { type: string, nullable: true }
            assignedUserId: { type: string, nullable: true }
      contextItemId: { type: string, nullable: true }
      lastMessage:
        nullable: true
        type: object
        required: [messageId, preview, senderParticipantId, createdAt]
        properties:
          messageId: { type: string }
          preview: { type: string }
          senderParticipantId: { type: string, nullable: true }
          createdAt: { type: string, format: date-time }
      myUnreadCount: { type: integer }
      updatedAt: { type: string, format: date-time }

  ChatList:
    type: object
    required: [chats, total]
    properties:
      chats:
        type: array
        items: { $ref: "#/components/ChatListItem" }
      total: { type: integer }

  ChatDetail:
    $ref: "#/components/ChatListItem"

  ChatMessage:
    type: object
    required: [messageId, chatId, kind, mediaIds, createdAt]
    properties:
      messageId: { type: string }
      chatId: { type: string }
      senderParticipantId: { type: string, nullable: true }
      kind: { type: string, enum: [text, media, system] }
      text: { type: string, nullable: true }
      mediaIds: { type: array, items: { type: string } }
      systemEvent:
        nullable: true
        type: object
        properties:
          type: { type: string }
          payload: { type: object, additionalProperties: true }
      createdAt: { type: string, format: date-time }
      editedAt: { type: string, format: date-time, nullable: true }
      deletedAt: { type: string, format: date-time, nullable: true }

  SearchHit:
    type: object
    required: [messageId, chatId, snippet, highlightedText, createdAt]
    properties:
      messageId: { type: string }
      chatId: { type: string }
      snippet: { type: string }
      highlightedText: { type: string }
      senderParticipantId: { type: string, nullable: true }
      senderUserId: { type: string, nullable: true }
      senderKind: { type: string, enum: [user, organization, support], nullable: true }
      createdAt: { type: string, format: date-time }

  ChatPreview:
    type: object
    required: [partyOther, contextItemId]
    properties:
      partyOther:
        type: object
        required: [kind, subjectId]
        properties:
          kind: { type: string, enum: [user, organization, support] }
          subjectId: { type: string, nullable: true }
      contextItemId: { type: string, nullable: true }

  SearchResultsGlobal:
    type: object
    required: [results, nextCursor]
    properties:
      results:
        type: array
        items:
          allOf:
            - $ref: "#/components/SearchHit"
            - type: object
              properties:
                chatPreview:
                  oneOf:
                    - $ref: "#/components/ChatPreview"
                    - { type: 'null' }
      nextCursor: { type: string, nullable: true }

  SearchResultsInChat:
    type: object
    required: [results, nextCursor]
    properties:
      results:
        type: array
        items: { $ref: "#/components/SearchHit" }
      nextCursor: { type: string, nullable: true }

  DomainError:
    description: Доменная ошибка
    content:
      application/json:
        schema:
          $ref: ../../shared/error-response.yaml#/DomainErrorResponse
