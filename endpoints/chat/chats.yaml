# ─────────────────────────────────────────────────────────────────────────
# Realtime
# ─────────────────────────────────────────────────────────────────────────

getCentrifugoToken:
  operationId: getCentrifugoToken
  tags: [chat]
  summary: Получить connection JWT для Centrifugo
  security: [{ bearerAuth: [] }]
  responses:
    "200":
      description: Connection token
      content:
        application/json:
          schema:
            type: object
            required: [token, expiresAt]
            properties:
              token: { type: string }
              expiresAt: { type: string, format: date-time }
    "401": { description: Не авторизован }

# ─────────────────────────────────────────────────────────────────────────
# Client-side endpoints
# ─────────────────────────────────────────────────────────────────────────

openChatWithOrganization:
  operationId: openChatWithOrganization
  tags: [chat]
  summary: Создать или продолжить чат с организацией
  security: [{ bearerAuth: [] }]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [organizationId, message]
          properties:
            organizationId: { type: string }
            contextItemId: { type: string, nullable: true }
            message:
              type: object
              required: [text, mediaIds]
              properties:
                text: { type: string, nullable: true }
                mediaIds: { type: array, items: { type: string } }
  responses:
    "200":
      description: Чат создан или продолжён
      content:
        application/json:
          schema: { $ref: "#/components/ChatOpenResponse" }
    "400": { $ref: "#/components/DomainError" }
    "401": { description: Не авторизован }
    "404": { $ref: "#/components/DomainError" }
    "409": { $ref: "#/components/DomainError" }

openChatWithSupport:
  operationId: openChatWithSupport
  tags: [chat]
  summary: Создать или продолжить чат с поддержкой
  security: [{ bearerAuth: [] }]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [message]
          properties:
            message:
              type: object
              required: [text, mediaIds]
              properties:
                text: { type: string, nullable: true }
                mediaIds: { type: array, items: { type: string } }
  responses:
    "200":
      description: Чат создан или продолжён
      content:
        application/json:
          schema: { $ref: "#/components/ChatOpenResponse" }
    "400": { $ref: "#/components/DomainError" }
    "401": { description: Не авторизован }
    "409": { $ref: "#/components/DomainError" }

sendMessageInChat:
  operationId: sendMessageInChat
  tags: [chat]
  summary: Отправить сообщение в существующий чат (со стороны клиента)
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [text, mediaIds]
          properties:
            text: { type: string, nullable: true }
            mediaIds: { type: array, items: { type: string } }
  responses:
    "200":
      description: Отправлено
      content:
        application/json:
          schema:
            type: object
            required: [messageId, reopened]
            properties:
              messageId: { type: string }
              reopened: { type: boolean }
    "400": { $ref: "#/components/DomainError" }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }

editMessageInChat:
  operationId: editMessageInChat
  tags: [chat]
  summary: Отредактировать своё сообщение
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
    - { name: messageId, in: path, required: true, schema: { type: string } }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [text, mediaIds]
          properties:
            text: { type: string, nullable: true }
            mediaIds: { type: array, items: { type: string } }
  responses:
    "204": { description: OK }
    "400": { $ref: "#/components/DomainError" }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }

deleteMessageInChat:
  operationId: deleteMessageInChat
  tags: [chat]
  summary: Удалить (soft) своё сообщение
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
    - { name: messageId, in: path, required: true, schema: { type: string } }
  responses:
    "204": { description: OK }
    "400": { $ref: "#/components/DomainError" }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }

reportMessage:
  operationId: reportMessage
  tags: [chat]
  summary: Пожаловаться на сообщение
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
    - { name: messageId, in: path, required: true, schema: { type: string } }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [reason]
          properties:
            reason: { type: string }
            category:
              type: string
              nullable: true
              enum: [spam, abuse, illegal, other, null]
  responses:
    "204": { description: OK }
    "400": { $ref: "#/components/DomainError" }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }
    "409": { $ref: "#/components/DomainError" }

reportChat:
  operationId: reportChat
  tags: [chat]
  summary: Пожаловаться на чат целиком
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [reason]
          properties:
            reason: { type: string }
            category:
              type: string
              nullable: true
              enum: [spam, abuse, illegal, other, null]
  responses:
    "204": { description: OK }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }

markChatRead:
  operationId: markChatRead
  tags: [chat]
  summary: Отметить чат прочитанным до сообщения
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [upToMessageId]
          properties:
            upToMessageId: { type: string }
  responses:
    "204": { description: OK }
    "403": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }

listMyChats:
  operationId: listMyChats
  tags: [chat]
  summary: Мои чаты (клиент)
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: from, in: query, schema: { type: integer, minimum: 0 } }
    - { name: size, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
  responses:
    "200":
      description: Список
      content:
        application/json:
          schema: { $ref: "#/components/ChatList" }

getChatDetail:
  operationId: getChatDetail
  tags: [chat]
  summary: Детали чата
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
  responses:
    "200":
      description: Детали
      content:
        application/json:
          schema: { $ref: "#/components/ChatDetail" }
    "404": { $ref: "#/components/DomainError" }

getChatMessages:
  operationId: getChatMessages
  tags: [chat]
  summary: История сообщений чата
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
    - { name: cursor, in: query, schema: { type: string } }
    - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
  responses:
    "200":
      description: Страница
      content:
        application/json:
          schema:
            type: object
            required: [messages, nextCursor]
            properties:
              messages:
                type: array
                items: { $ref: "#/components/ChatMessage" }
              nextCursor: { type: string, nullable: true }
    "400": { $ref: "#/components/DomainError" }
    "404": { $ref: "#/components/DomainError" }

getUnreadSummary:
  operationId: getUnreadSummary
  tags: [chat]
  summary: Сводка непрочитанных
  security: [{ bearerAuth: [] }]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [totalUnreadCount, perChat]
            properties:
              totalUnreadCount: { type: integer }
              perChat:
                type: array
                items:
                  type: object
                  required: [chatId, count]
                  properties:
                    chatId: { type: string }
                    count: { type: integer }

searchInMyChats:
  operationId: searchInMyChats
  tags: [chat]
  summary: Полнотекстовый поиск по моим чатам (глобальный)
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: q, in: query, required: true, schema: { type: string } }
    - { name: cursor, in: query, schema: { type: string } }
    - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 50 } }
  responses:
    "200":
      description: Результаты
      content:
        application/json:
          schema: { $ref: "#/components/SearchResultsGlobal" }
    "400": { $ref: "#/components/DomainError" }

searchInChat:
  operationId: searchInChat
  tags: [chat]
  summary: Поиск в пределах одного чата (клиент)
  security: [{ bearerAuth: [] }]
  parameters:
    - { name: chatId, in: path, required: true, schema: { type: string } }
    - { name: q, in: query, required: true, schema: { type: string } }
    - { name: cursor, in: query, schema: { type: string } }
    - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 50 } }
  responses:
    "200":
      description: Результаты
      content:
        application/json:
          schema: { $ref: "#/components/SearchResultsInChat" }
    "400": { $ref: "#/components/DomainError" }
