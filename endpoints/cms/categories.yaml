getCmsCategories:
  operationId: getCmsCategories
  tags:
    - cms-categories
  summary: Список категорий (CMS)
  description: Возвращает все категории для административной панели.
  security:
    - bearerAuth: []
  responses:
    "200":
      description: Список категорий
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../../shared/cms.yaml#/CmsCategoryListItem
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

getCmsCategoryDetail:
  operationId: getCmsCategoryDetail
  tags:
    - cms-categories
  summary: Детали категории (CMS)
  description: Возвращает полную информацию о категории.
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Детали категории
      content:
        application/json:
          schema:
            $ref: ../../shared/cms.yaml#/CmsCategoryDetail
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Категория не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

createCmsCategory:
  operationId: createCmsCategory
  tags:
    - cms-categories
  summary: Создание категории
  description: Создаёт новую категорию.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - id
            - name
            - iconId
            - allowedTypeIds
            - ageGroups
          properties:
            id:
              type: string
            parentCategoryId:
              type:
                - string
                - "null"
            name:
              type: string
              minLength: 1
            iconId:
              type: string
            order:
              type: integer
              default: 0
            allowedTypeIds:
              type: array
              items:
                type: string
            ageGroups:
              type: array
              items:
                type: string
                enum: [children, adults]
  responses:
    "201":
      description: Категория создана
      content:
        application/json:
          schema:
            $ref: ../../shared/cms.yaml#/CmsCategoryDetail
    "400":
      description: Ошибка валидации или доменная ошибка
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../shared/error-response.yaml#/OpenApiValidationError
              - $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Родительская категория не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

