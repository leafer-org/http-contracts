createRole:
  operationId: createRole
  tags:
    - roles
  summary: Создание роли
  description: Создаёт новую роль с указанными разрешениями.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              minLength: 1
            permissions:
              type: array
              items:
                type: string
  responses:
    "201":
      description: Роль создана
      content:
        application/json:
          schema:
            $ref: ../../shared/role.yaml#/Role
    "400":
      description: Ошибка валидации, роль уже существует или невалидные разрешения
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../shared/error-response.yaml#/OpenApiValidationError
              - type: object
                required:
                  - type
                  - isDomain
                properties:
                  type:
                    type: string
                    enum:
                      - role_already_exists
                      - invalid_permissions
                  message:
                    type: string
                  isDomain:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    additionalProperties: true
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Роль не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
