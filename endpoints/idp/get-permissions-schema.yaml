getPermissionsSchema:
  operationId: getPermissionsSchema
  tags:
    - roles
  summary: Получение схемы разрешений
  description: Возвращает схему всех доступных разрешений для построения UI.
  security:
    - bearerAuth: []
  responses:
    "200":
      description: Схема разрешений
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              required:
                - action
                - key
                - type
                - default
              properties:
                action:
                  type: string
                key:
                  type: string
                type:
                  type: string
                  enum:
                    - boolean
                    - enum
                values:
                  type: array
                  items:
                    type: string
                default: {}
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
