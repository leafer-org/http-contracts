getPermissionsSchema:
  operationId: getPermissionsSchema
  tags:
    - roles
  summary: Каталог пермишенов и групп
  description: Возвращает список групп пермишенов с описанием для построения UI редактирования ролей.
  security:
    - bearerAuth: []
  responses:
    "200":
      description: Каталог пермишенов
      content:
        application/json:
          schema:
            type: object
            required:
              - groups
            properties:
              groups:
                type: array
                items:
                  $ref: ../../shared/role.yaml#/PermissionGroup
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
