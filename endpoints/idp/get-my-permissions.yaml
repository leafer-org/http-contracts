getMyPermissions:
  operationId: getMyPermissions
  tags:
    - auth
    - profile
  summary: Получение пермишенов текущего пользователя
  description: Возвращает разрешённые действия текущего пользователя на основе его роли.
  security:
    - bearerAuth: []
  responses:
    "200":
      description: Пермишены пользователя
      content:
        application/json:
          schema:
            type: object
            required:
              - permissions
            additionalProperties: false
            properties:
              permissions:
                type: array
                items:
                  type: string
    "401":
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
