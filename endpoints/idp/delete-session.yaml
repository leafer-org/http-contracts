deleteSession:
  operationId: deleteSession
  tags:
    - auth
    - sessions
  summary: Удаление сессии
  description: Удаляет указанную сессию текущего пользователя.
  security:
    - bearerAuth: []
  parameters:
    - name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    "204":
      description: Сессия удалена
    "400":
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
    "401":
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Сессия не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
