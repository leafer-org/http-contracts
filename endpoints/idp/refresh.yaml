refresh:
  operationId: refresh
  tags:
    - auth
  summary: Обновление токенов авторизации
  description: Обновляет токены по refresh-cookie или заголовку.
  parameters:
    - name: x-refresh-token
      in: header
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Токены обновлены
      content:
        application/json:
          schema:
            $ref: ../../shared/token.yaml#/TokenPair
    "400":
      description: Ошибка валидации / Доменная ошибка
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../shared/error-response.yaml#/OpenApiValidationError
              - $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      description: Невалидный refresh-токен
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
