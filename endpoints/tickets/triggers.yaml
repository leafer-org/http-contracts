getAdminTicketTriggers:
  operationId: getAdminTicketTriggers
  tags:
    - tickets
    - boards
  summary: Справочник триггеров
  security:
    - bearerAuth: []
  parameters:
    - name: category
      in: query
      schema:
        type: string
        enum:
          - open
          - close
          - redirect
      description: Фильтр по категории подписки
  responses:
    "200":
      description: Список триггеров
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../../shared/ticket.yaml#/TriggerInfo
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

