getAdminTickets:
  operationId: getAdminTickets
  tags:
    - tickets
  summary: Список тикетов
  security:
    - bearerAuth: []
  parameters:
    - name: boardId
      in: query
      schema:
        type: string
      description: Фильтр по доске
    - name: status
      in: query
      schema:
        type: string
        enum:
          - open
          - in-progress
          - done
      description: Фильтр по статусу
    - name: assigneeId
      in: query
      schema:
        type: string
      description: Фильтр по исполнителю
    - name: from
      in: query
      schema:
        type: integer
        minimum: 0
      description: Смещение для пагинации
    - name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
      description: Размер страницы
  responses:
    "200":
      description: Список тикетов
      content:
        application/json:
          schema:
            type: object
            required:
              - tickets
              - total
            properties:
              tickets:
                type: array
                items:
                  $ref: ../../shared/ticket.yaml#/TicketListItem
              total:
                type: integer
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

