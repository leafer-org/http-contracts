createAdminTicket:
  operationId: createAdminTicket
  tags:
    - tickets
  summary: Ручное создание тикета
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - boardId
            - message
          properties:
            boardId:
              type: string
            message:
              type: string
              minLength: 1
            data:
              $ref: ../../shared/ticket.yaml#/TicketDataInput
  responses:
    "201":
      description: Тикет создан
      content:
        application/json:
          schema:
            type: object
            required:
              - ticketId
              - boardId
              - message
              - status
              - createdAt
            properties:
              ticketId:
                type: string
              boardId:
                type: string
              message:
                type: string
              status:
                type: string
                enum:
                  - open
                  - in-progress
                  - done
              createdAt:
                type: string
                format: date-time
    "400":
      description: Ошибка валидации / Ручное создание запрещено
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../shared/error-response.yaml#/OpenApiValidationError
              - $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "403":
      description: Нет доступа / Не участник доски
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Доска не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

