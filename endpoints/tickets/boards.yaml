getAdminBoards:
  operationId: getAdminBoards
  tags:
    - tickets
    - boards
  summary: Список досок
  security:
    - bearerAuth: []
  parameters:
    - name: scope
      in: query
      schema:
        type: string
        enum:
          - platform
          - organization
      description: Фильтр по scope
  responses:
    "200":
      description: Список досок
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../../shared/ticket.yaml#/BoardListItem
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

createAdminBoard:
  operationId: createAdminBoard
  tags:
    - tickets
    - boards
  summary: Создание доски
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - scope
            - manualCreation
          properties:
            name:
              type: string
              minLength: 1
            description:
              type:
                - string
                - "null"
            scope:
              type: string
              enum:
                - platform
                - organization
            organizationId:
              type:
                - string
                - "null"
            manualCreation:
              type: boolean
  responses:
    "201":
      description: Доска создана
      content:
        application/json:
          schema:
            $ref: ../../shared/ticket.yaml#/BoardDetail
    "400":
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

updateAdminBoard:
  operationId: updateAdminBoard
  tags:
    - tickets
    - boards
  summary: Обновление доски
  security:
    - bearerAuth: []
  parameters:
    - name: boardId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - manualCreation
            - allowedTransferBoardIds
          properties:
            name:
              type: string
              minLength: 1
            description:
              type:
                - string
                - "null"
            manualCreation:
              type: boolean
            allowedTransferBoardIds:
              type: array
              items:
                type: string
  responses:
    "200":
      description: Доска обновлена
      content:
        application/json:
          schema:
            $ref: ../../shared/ticket.yaml#/BoardDetail
    "400":
      description: Ошибка валидации / Доменная ошибка
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../shared/error-response.yaml#/OpenApiValidationError
              - $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Доска не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

deleteAdminBoard:
  operationId: deleteAdminBoard
  tags:
    - tickets
    - boards
  summary: Удаление доски
  security:
    - bearerAuth: []
  parameters:
    - name: boardId
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Доска удалена
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Доска не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

addAdminBoardSubscription:
  operationId: addAdminBoardSubscription
  tags:
    - tickets
    - boards
  summary: Добавление подписки на триггер
  security:
    - bearerAuth: []
  parameters:
    - name: boardId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - triggerId
            - filters
          properties:
            triggerId:
              type: string
            filters:
              type: array
              items:
                $ref: ../../shared/ticket.yaml#/SubscriptionFilter
  responses:
    "201":
      description: Подписка добавлена
      content:
        application/json:
          schema:
            type: object
            required:
              - boardId
              - subscriptions
            properties:
              boardId:
                type: string
              subscriptions:
                type: array
                items:
                  $ref: ../../shared/ticket.yaml#/BoardSubscription
    "400":
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Доска не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

removeAdminBoardSubscription:
  operationId: removeAdminBoardSubscription
  tags:
    - tickets
    - boards
  summary: Удаление подписки на триггер
  security:
    - bearerAuth: []
  parameters:
    - name: boardId
      in: path
      required: true
      schema:
        type: string
    - name: subId
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Подписка удалена
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Доска или подписка не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

addAdminBoardMember:
  operationId: addAdminBoardMember
  tags:
    - tickets
    - boards
  summary: Добавление участника доски
  security:
    - bearerAuth: []
  parameters:
    - name: boardId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - userId
          properties:
            userId:
              type: string
  responses:
    "201":
      description: Участник добавлен
      content:
        application/json:
          schema:
            type: object
            required:
              - boardId
              - memberIds
            properties:
              boardId:
                type: string
              memberIds:
                type: array
                items:
                  type: string
    "400":
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Доска не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "409":
      description: Участник уже добавлен
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

removeAdminBoardMember:
  operationId: removeAdminBoardMember
  tags:
    - tickets
    - boards
  summary: Удаление участника доски
  security:
    - bearerAuth: []
  parameters:
    - name: boardId
      in: path
      required: true
      schema:
        type: string
    - name: userId
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Участник удалён
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Доска или участник не найден
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

