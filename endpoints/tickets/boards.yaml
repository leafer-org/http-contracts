            - systemPrompt
          properties:
            agentId:
              type: string
            systemPrompt:
              type: string
              minLength: 1
            onUncertainMoveToBoardId:
              type:
                - string
                - "null"
  responses:
    "200":
      description: Автоматизация добавлена
      content:
        application/json:
          schema:
            type: object
            required:
              - boardId
              - automations
            properties:
              boardId:
                type: string
              automations:
                type: array
                items:
                  $ref: ../../shared/ticket.yaml#/BoardAutomation
    "400":
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Доска не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "500":
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError

removeAdminBoardAutomation:
  operationId: removeAdminBoardAutomation
  tags:
    - tickets
    - boards
  summary: Удаление автоматизации
  security:
    - bearerAuth: []
  parameters:
    - name: boardId
      in: path
      required: true
      schema:
        type: string
    - name: automationId
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Автоматизация удалена
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Доска или автоматизация не найдена
