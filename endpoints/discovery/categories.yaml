getCategories:
  operationId: getCategories
  tags:
    - Discovery
  description: Список дочерних категорий с количеством товаров
  parameters:
    - name: parentCategoryId
      in: query
      required: false
      schema:
        type: string
      description: ID родительской категории. Если не указан — возвращает корневые категории.
  responses:
    "200":
      description: Список категорий
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../../shared/discovery.yaml#/CategoryListItem

getCategoryItems:
  operationId: getCategoryItems
  tags:
    - Discovery
  description: Товары в категории с фильтрами и сортировкой
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: ID категории
    - name: sort
      in: query
      required: false
      schema:
        type: string
        enum: [personal, price-asc, price-desc, rating-desc, newest]
        default: personal
      description: Режим сортировки
    - name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Курсор для пагинации
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Количество элементов на странице
    - name: cityId
      in: query
      required: false
      schema:
        type: string
      description: ID города для гео-фильтрации
    - name: ageGroup
      in: query
      required: false
      schema:
        type: string
        enum: [adults, children, all]
        default: adults
      description: Возрастная группа
    - name: typeIds
      in: query
      required: false
      schema:
        type: string
      description: Фильтр по типам товара (через запятую)
    - name: priceMin
      in: query
      required: false
      schema:
        type: number
      description: Минимальная цена
    - name: priceMax
      in: query
      required: false
      schema:
        type: number
      description: Максимальная цена
    - name: minRating
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        maximum: 5
      description: Минимальный рейтинг
    - name: attributeValues
      in: query
      required: false
      schema:
        type: string
      description: JSON-массив фильтров по атрибутам [{"attributeId":"...","value":"..."}]
    - name: lat
      in: query
      required: false
      schema:
        type: number
      description: Широта для гео-фильтрации (требуется вместе с lng и radiusKm)
    - name: lng
      in: query
      required: false
      schema:
        type: number
      description: Долгота для гео-фильтрации (требуется вместе с lat и radiusKm)
    - name: radiusKm
      in: query
      required: false
      schema:
        type: number
      description: Радиус в км для гео-фильтрации (требуется вместе с lat и lng)
    - name: dateFrom
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Начало диапазона дат для фильтрации событий
    - name: dateTo
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Конец диапазона дат для фильтрации событий
    - name: scheduleDayOfWeek
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 6
      description: День недели для фильтрации по расписанию (0=вс, 1=пн, ..., 6=сб)
    - name: scheduleTimeFrom
      in: query
      required: false
      schema:
        type: string
      description: Начало диапазона времени (HH:mm) для фильтрации по расписанию
    - name: scheduleTimeTo
      in: query
      required: false
      schema:
        type: string
      description: Конец диапазона времени (HH:mm) для фильтрации по расписанию
  responses:
    "200":
      description: Список товаров с курсором
      content:
        application/json:
          schema:
            $ref: ../../shared/discovery.yaml#/CursorPaginatedItems

getCategoryFilters:
  operationId: getCategoryFilters
  tags:
    - Discovery
  description: Доступные фильтры для страницы категории
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: ID категории
  responses:
    "200":
      description: Фильтры категории
      content:
        application/json:
          schema:
            $ref: ../../shared/discovery.yaml#/CategoryFilters
    "404":
      description: Категория не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
