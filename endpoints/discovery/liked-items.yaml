getLikedItems:
  operationId: getLikedItems
  tags:
    - Discovery
  description: Список лайкнутых товаров пользователя с поиском по названию
  security:
    - bearerAuth: []
  parameters:
    - name: search
      in: query
      required: false
      schema:
        type: string
      description: Поиск по названию товара
    - name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Курсор для пагинации
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Количество элементов на странице
  responses:
    "200":
      description: Список лайкнутых товаров
      content:
        application/json:
          schema:
            $ref: ../../shared/discovery.yaml#/CursorPaginatedLikedItems
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
