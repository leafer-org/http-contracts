searchSuggestions:
  operationId: searchSuggestions
  tags:
    - Discovery
  description: |
    Подсказки автокомплита поиска. Возвращает 4 секции:
    - `categories` — категории по совпадению имени (LIKE).
    - `itemTypes` — типы товаров по совпадению имени (LIKE).
    - `items` — топ-N товаров через MeiliSearch (полная карточка).
    - `popularQueries` — самые частые запросы по этому городу.

    При пустом `query` секции `categories`/`itemTypes`/`items` пустые, отдаются только `popularQueries`.
  parameters:
    - $ref: ../../shared/device.yaml#/DeviceDprHeader
    - name: query
      in: query
      required: false
      schema:
        type: string
      description: Поисковый запрос. Если не указан или пустой — возвращаются только популярные запросы.
    - name: cityId
      in: query
      required: true
      schema:
        type: string
      description: ID города (для фильтрации товаров и популярных запросов)
    - name: ageGroup
      in: query
      required: false
      schema:
        type: string
        enum: [adults, children, all]
        default: adults
      description: Возрастная группа (для фильтрации товаров-подсказок)
  responses:
    "200":
      description: Подсказки по секциям
      content:
        application/json:
          schema:
            type: object
            required:
              - categories
              - itemTypes
              - organizations
              - items
              - popularQueries
            properties:
              categories:
                type: array
                items:
                  type: object
                  required:
                    - categoryId
                    - name
                  properties:
                    categoryId:
                      type: string
                    name:
                      type: string
              itemTypes:
                type: array
                items:
                  type: object
                  required:
                    - typeId
                    - name
                  properties:
                    typeId:
                      type: string
                    name:
                      type: string
                    parentCategoryId:
                      type:
                        - string
                        - "null"
              organizations:
                type: array
                items:
                  type: object
                  required:
                    - organizationId
                    - name
                  properties:
                    organizationId:
                      type: string
                    name:
                      type: string
                    avatarId:
                      type:
                        - string
                        - "null"
                    avatarUrl:
                      type:
                        - string
                        - "null"
                      format: uri
              items:
                type: array
                items:
                  $ref: ../../shared/discovery.yaml#/ItemListView
              popularQueries:
                type: array
                items:
                  type: object
                  required:
                    - text
                  properties:
                    text:
                      type: string
