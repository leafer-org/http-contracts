getFeed:
  operationId: getFeed
  tags:
    - Discovery
  description: Персонализированная лента рекомендаций по всему каталогу
  parameters:
    - name: cityId
      in: query
      required: true
      schema:
        type: string
      description: ID города
    - name: ageGroup
      in: query
      required: false
      schema:
        type: string
        enum: [adults, children, all]
        default: adults
      description: Возрастная группа
    - name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Курсор для пагинации
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Количество элементов на странице
  responses:
    "200":
      description: Лента товаров с курсором
      content:
        application/json:
          schema:
            $ref: ../../shared/discovery.yaml#/CursorPaginatedItems
