createItem:
  operationId: createItem
  tags:
    - organization-items
  summary: Создание товара
  description: Создаёт новый товар (черновик) в организации. Виджеты валидируются по типу товара и плану подписки.
  security:
    - bearerAuth: []
  parameters:
    - name: orgId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - typeId
            - widgets
          properties:
            typeId:
              type: string
            widgets:
              type: array
              items:
                $ref: ../../shared/organization.yaml#/ItemWidgetInput
  responses:
    "201":
      description: Товар создан
      content:
        application/json:
          schema:
            $ref: ../../shared/organization.yaml#/ItemDetail
    "400":
      description: Ошибка валидации или доменная ошибка
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../shared/error-response.yaml#/OpenApiValidationError
              - $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется edit_items) или виджет недоступен на плане
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

getItems:
  operationId: getOrganizationItems
  tags:
    - organization-items
  summary: Список товаров организации
  description: Возвращает список товаров организации с поиском и курсорной пагинацией.
  security:
    - bearerAuth: []
  parameters:
    - name: orgId
      in: path
      required: true
      schema:
        type: string
    - name: search
      in: query
      schema:
        type: string
    - name: cursor
      in: query
      schema:
        type: string
    - name: limit
      in: query
      schema:
        type: integer
        default: 20
  responses:
    "200":
      description: Список товаров
      content:
        application/json:
          schema:
            type: object
            required:
              - items
            properties:
              items:
                type: array
                items:
                  $ref: ../../shared/organization.yaml#/ItemListItem
              nextCursor:
                type:
                  - string
                  - "null"
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

getItemDetail:
  operationId: getItemDetail
  tags:
    - organization-items
  summary: Детали товара
  description: Возвращает полную информацию о товаре, включая черновик и публикацию.
  security:
    - bearerAuth: []
  parameters:
    - name: orgId
      in: path
      required: true
      schema:
        type: string
    - name: itemId
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Информация о товаре
      content:
        application/json:
          schema:
            $ref: ../../shared/organization.yaml#/ItemDetail
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация или товар не найдены
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

updateItemDraft:
  operationId: updateItemDraft
  tags:
    - organization-items
  summary: Обновление черновика товара
  description: Обновляет виджеты черновика товара. Невозможно, если черновик на модерации.
  security:
    - bearerAuth: []
  parameters:
    - name: orgId
      in: path
      required: true
      schema:
        type: string
    - name: itemId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - widgets
          properties:
            typeId:
              type: string
              description: Новый тип товара (опционально, если нужно сменить тип)
            widgets:
              type: array
              items:
                $ref: ../../shared/organization.yaml#/ItemWidgetInput
  responses:
    "200":
      description: Черновик обновлён
      content:
        application/json:
          schema:
            $ref: ../../shared/organization.yaml#/ItemDetail
    "400":
      description: Ошибка валидации или доменная ошибка
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../shared/error-response.yaml#/OpenApiValidationError
              - $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется edit_items)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация или товар не найдены
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

deleteItemDraft:
  operationId: deleteItemDraft
  tags:
    - organization-items
  summary: Удаление черновика товара
  description: Удаляет черновик товара. Если нет публикации — удаляет товар целиком.
  security:
    - bearerAuth: []
  parameters:
    - name: orgId
      in: path
      required: true
      schema:
        type: string
    - name: itemId
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Черновик удалён
    "400":
      description: Доменная ошибка (нет черновика)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется edit_items)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация или товар не найдены
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

submitItemForModeration:
  operationId: submitItemForModeration
  tags:
    - organization-items
  summary: Отправить товар на модерацию
  description: Отправляет черновик товара на модерацию. Возможно только из статуса draft или rejected.
  security:
    - bearerAuth: []
  parameters:
    - name: orgId
      in: path
      required: true
      schema:
        type: string
    - name: itemId
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Отправлено на модерацию
    "400":
      description: Доменная ошибка (лимит публикаций или неверный статус черновика)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется publish_items)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация или товар не найдены
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

approveItemModeration:
  operationId: approveItemModeration
  tags:
    - organization-items
  summary: Одобрить модерацию товара
  description: Одобряет модерацию товара. Требуется глобальный permission ORGANIZATION.MODERATE.
  security:
    - bearerAuth: []
  parameters:
    - name: orgId
      in: path
      required: true
      schema:
        type: string
    - name: itemId
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Модерация одобрена
    "400":
      description: Доменная ошибка (товар не на модерации)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется ORGANIZATION.MODERATE)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Товар не найден
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

rejectItemModeration:
  operationId: rejectItemModeration
  tags:
    - organization-items
  summary: Отклонить модерацию товара
  description: Отклоняет модерацию товара. Требуется глобальный permission ORGANIZATION.MODERATE.
  security:
    - bearerAuth: []
  parameters:
    - name: orgId
      in: path
      required: true
      schema:
        type: string
    - name: itemId
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Модерация отклонена
    "400":
      description: Доменная ошибка (товар не на модерации)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется ORGANIZATION.MODERATE)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Товар не найден
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

unpublishItem:
  operationId: unpublishItem
  tags:
    - organization-items
  summary: Снять товар с публикации
  description: Снимает товар с публикации. Данные публикации копируются в новый черновик.
  security:
    - bearerAuth: []
  parameters:
    - name: orgId
      in: path
      required: true
      schema:
        type: string
    - name: itemId
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Товар снят с публикации
    "400":
      description: Доменная ошибка (товар не опубликован)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется unpublish_items)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация или товар не найдены
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
