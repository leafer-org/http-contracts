createOrganization:
  operationId: createOrganization
  tags:
    - organizations
  summary: Создание организации
  description: Создаёт новую организацию. Текущий пользователь становится владельцем с ролью ADMIN.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - description
          properties:
            name:
              type: string
              minLength: 1
            description:
              type: string
            avatarId:
              type:
                - string
                - "null"
            media:
              type: array
              items:
                $ref: ../../shared/media.yaml#/MediaItem
  responses:
    "201":
      description: Организация создана
      content:
        application/json:
          schema:
            $ref: ../../shared/organization.yaml#/OrganizationDetail
    "400":
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError

getOrganization:
  operationId: getOrganization
  tags:
    - organizations
  summary: Детали организации
  description: Возвращает полную информацию об организации (для сотрудника/владельца).
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Информация об организации
      content:
        application/json:
          schema:
            $ref: ../../shared/organization.yaml#/OrganizationDetail
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

updateInfoDraft:
  operationId: updateInfoDraft
  tags:
    - organizations
  summary: Обновление черновика профиля
  description: Обновляет черновик профиля организации (name, description, avatarId).
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - description
          properties:
            name:
              type: string
              minLength: 1
            description:
              type: string
            avatarId:
              type:
                - string
                - "null"
            media:
              type: array
              items:
                $ref: ../../shared/media.yaml#/MediaItem
  responses:
    "200":
      description: Черновик обновлён
      content:
        application/json:
          schema:
            $ref: ../../shared/organization.yaml#/OrganizationDetail
    "400":
      description: Ошибка валидации или доменная ошибка
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../shared/error-response.yaml#/OpenApiValidationError
              - $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется edit_organization)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

submitInfoForModeration:
  operationId: submitInfoForModeration
  tags:
    - organizations
  summary: Отправить профиль на модерацию
  description: Отправляет черновик профиля организации на модерацию. Возможно только из статуса draft или rejected.
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Отправлено на модерацию
    "400":
      description: Доменная ошибка (профиль не в статусе draft/rejected)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется publish_organization)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

approveInfoModeration:
  operationId: approveInfoModeration
  tags:
    - organizations
  summary: Одобрить модерацию профиля
  description: Одобряет модерацию профиля организации. Требуется глобальный permission ORGANIZATION.MODERATE.
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Модерация одобрена
    "400":
      description: Доменная ошибка (профиль не на модерации)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется ORGANIZATION.MODERATE)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

deleteOrganization:
  operationId: deleteOrganization
  tags:
    - organizations
  summary: Удаление организации
  description: Удаляет организацию и все её товары. Доступно владельцу организации или админу с ORGANIZATION.MANAGE.
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Организация удалена
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

claimOrganization:
  operationId: claimOrganization
  tags:
    - organizations
  summary: Привязка владельца к организации
  description: Привязывает текущего пользователя как владельца организации по claim token.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - token
          properties:
            token:
              type: string
              format: uuid
  responses:
    "200":
      description: Организация привязана
      content:
        application/json:
          schema:
            $ref: ../../shared/organization.yaml#/OrganizationDetail
    "400":
      description: Доменная ошибка (невалидный токен или организация уже привязана)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError

discardInfoDraftChanges:
  operationId: discardInfoDraftChanges
  tags:
    - organizations
  summary: Отменить изменения черновика
  description: Возвращает черновик к состоянию опубликованного профиля. Требуется edit_organization.
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Изменения черновика отменены
    "400":
      description: Доменная ошибка (нет публикации или нет изменений)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется edit_organization)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

unpublishOrganization:
  operationId: unpublishOrganization
  tags:
    - organizations
  summary: Снять организацию с публикации
  description: Снимает организацию с публикации и снимает все опубликованные товары. Требуется publish_organization или ORGANIZATION.MANAGE.
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Организация снята с публикации
    "400":
      description: Доменная ошибка (организация не опубликована)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется publish_organization)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

rejectInfoModeration:
  operationId: rejectInfoModeration
  tags:
    - organizations
  summary: Отклонить модерацию профиля
  description: Отклоняет модерацию профиля организации. Требуется глобальный permission ORGANIZATION.MODERATE.
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Модерация отклонена
    "400":
      description: Доменная ошибка (профиль не на модерации)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется ORGANIZATION.MODERATE)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
