createOrganization:
  operationId: createOrganization
  tags:
    - organizations
  summary: Создание организации
  description: Создаёт новую организацию. Текущий пользователь становится владельцем с ролью ADMIN.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - description
          properties:
            name:
              type: string
              minLength: 1
            description:
              type: string
            avatarId:
              type:
                - string
                - "null"
  responses:
    "201":
      description: Организация создана
      content:
        application/json:
          schema:
            $ref: ../../shared/organization.yaml#/OrganizationDetail
    "400":
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/OpenApiValidationError
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError

getOrganization:
  operationId: getOrganization
  tags:
    - organizations
  summary: Детали организации
  description: Возвращает полную информацию об организации (для сотрудника/владельца).
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Информация об организации
      content:
        application/json:
          schema:
            $ref: ../../shared/organization.yaml#/OrganizationDetail
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

updateInfoDraft:
  operationId: updateInfoDraft
  tags:
    - organizations
  summary: Обновление черновика профиля
  description: Обновляет черновик профиля организации (name, description, avatarId).
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - description
          properties:
            name:
              type: string
              minLength: 1
            description:
              type: string
            avatarId:
              type:
                - string
                - "null"
  responses:
    "200":
      description: Черновик обновлён
      content:
        application/json:
          schema:
            $ref: ../../shared/organization.yaml#/OrganizationDetail
    "400":
      description: Ошибка валидации или доменная ошибка
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../shared/error-response.yaml#/OpenApiValidationError
              - $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется edit_organization)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse

submitInfoForModeration:
  operationId: submitInfoForModeration
  tags:
    - organizations
  summary: Отправить профиль на модерацию
  description: Отправляет черновик профиля организации на модерацию. Возможно только из статуса draft или rejected.
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    "204":
      description: Отправлено на модерацию
    "400":
      description: Доменная ошибка (профиль не в статусе draft/rejected)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "401":
      $ref: ../../shared/responses.yaml#/UnauthorizedError
    "403":
      description: Нет доступа (требуется publish_organization)
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
    "404":
      description: Организация не найдена
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/DomainErrorResponse
