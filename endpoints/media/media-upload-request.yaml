mediaUploadRequest:
  operationId: mediaUploadRequest
  tags:
    - media
  summary: Получение presigned URL для загрузки файла
  description: Возвращает presigned URL и идентификатор файла для загрузки.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../shared/media.yaml#/UploadRequest
  responses:
    "200":
      description: Presigned URL для загрузки
      content:
        application/json:
          schema:
            $ref: ../../shared/media.yaml#/UploadRequestResult
    "401":
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/ErrorResponse
