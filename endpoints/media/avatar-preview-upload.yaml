avatarPreviewUpload:
  operationId: avatarPreviewUpload
  tags:
    - media
    - profile
  summary: Получение preview URL для загрузки аватара
  description: Возвращает preview URL для загрузки аватара.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../shared/media.yaml#/LinkMediaData
  responses:
    "200":
      description: URL превью аватара
      content:
        application/json:
          schema:
            $ref: ../../shared/user.yaml#/Avatar
    "401":
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/ErrorResponse
