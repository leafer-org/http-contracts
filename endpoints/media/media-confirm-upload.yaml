mediaConfirmUpload:
  operationId: mediaConfirmUpload
  tags:
    - media
  summary: Подтверждение загрузки файлов
  description: Переводит загруженные файлы из временного хранилища в постоянное.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../shared/media.yaml#/ConfirmUploadInput
  responses:
    "200":
      description: Загрузка подтверждена
      content:
        application/json:
          schema:
            type: object
    "401":
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/ErrorResponse
    "404":
      description: Файл не найден
      content:
        application/json:
          schema:
            $ref: ../../shared/error-response.yaml#/ErrorResponse
