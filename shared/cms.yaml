WidgetType:
  type: string
  enum:
    - base-info
    - age-group
    - location
    - payment
    - category
    - owner
    - item-review
    - owner-review
    - event-date-time
    - schedule
    - contact-info

ContactLink:
  type: object
  required:
    - type
    - value
  properties:
    type:
      type: string
      enum: [phone, email, link]
    value:
      type: string
    label:
      type: string

CategoryAttribute:
  type: object
  required:
    - attributeId
    - name
    - required
    - schema
  properties:
    attributeId:
      type: string
    name:
      type: string
    required:
      type: boolean
    schema:
      $ref: ../shared/discovery.yaml#/AttributeSchema

CmsCategoryListItem:
  type: object
  required:
    - id
    - name
    - iconId
    - order
    - status
    - attributes
    - iconUrl
    - ageGroups
    - allowedTypeIds
  properties:
    id:
      type: string
    parentCategoryId:
      type:
        - string
        - "null"
    name:
      type: string
    iconId:
      type: string
    order:
      type: integer
      default: 0
    iconUrl:
      type: string
    ageGroups:
      type: array
      items:
        type: string
        enum: [children, adults]
    allowedTypeIds:
      type: array
      items:
        type: string
    status:
      type: string
      enum: [draft, published, unpublished]
    attributes:
      type: array
      items:
        $ref: "#/CategoryAttribute"

CmsCategoryDetail:
  type: object
  required:
    - id
    - name
    - iconId
    - order
    - allowedTypeIds
    - attributes
    - status
    - iconUrl
    - ageGroups
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    parentCategoryId:
      type:
        - string
        - "null"
    name:
      type: string
    iconId:
      type: string
    order:
      type: integer
      default: 0
    iconUrl:
      type: string
    ageGroups:
      type: array
      items:
        type: string
        enum: [children, adults]
    allowedTypeIds:
      type: array
      items:
        type: string
    attributes:
      type: array
      items:
        $ref: "#/CategoryAttribute"
    status:
      type: string
      enum: [draft, published, unpublished]
    publishedAt:
      type:
        - string
        - "null"
      format: date-time
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

PaymentStrategy:
  type: string
  enum:
    - free
    - one-time
    - subscription

BaseWidgetSettings:
  type: object
  required:
    - type
    - required
  properties:
    type:
      type: string
      enum:
        - base-info
        - age-group
        - location
        - category
        - owner
        - item-review
        - owner-review
        - schedule
        - contact-info
    required:
      type: boolean

PaymentWidgetSettings:
  type: object
  required:
    - type
    - required
    - allowedStrategies
  properties:
    type:
      type: string
      enum:
        - payment
    required:
      type: boolean
    allowedStrategies:
      type: array
      items:
        $ref: "#/PaymentStrategy"

EventDateTimeWidgetSettings:
  type: object
  required:
    - type
    - required
  properties:
    type:
      type: string
      enum:
        - event-date-time
    required:
      type: boolean
    maxDates:
      type:
        - integer
        - "null"

WidgetSettings:
  oneOf:
    - $ref: "#/PaymentWidgetSettings"
    - $ref: "#/EventDateTimeWidgetSettings"
    - $ref: "#/BaseWidgetSettings"
  discriminator:
    propertyName: type
    mapping:
      payment: "#/PaymentWidgetSettings"
      event-date-time: "#/EventDateTimeWidgetSettings"
      base-info: "#/BaseWidgetSettings"
      age-group: "#/BaseWidgetSettings"
      location: "#/BaseWidgetSettings"
      category: "#/BaseWidgetSettings"
      owner: "#/BaseWidgetSettings"
      item-review: "#/BaseWidgetSettings"
      owner-review: "#/BaseWidgetSettings"
      schedule: "#/BaseWidgetSettings"
      contact-info: "#/BaseWidgetSettings"

ItemTypeListItem:
  type: object
  required:
    - id
    - name
    - label
    - widgetSettings
  properties:
    id:
      type: string
    name:
      type: string
    label:
      type: string
    widgetSettings:
      type: array
      items:
        $ref: "#/WidgetSettings"

ItemTypeDetail:
  type: object
  required:
    - id
    - name
    - label
    - widgetSettings
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    name:
      type: string
    label:
      type: string
    widgetSettings:
      type: array
      items:
        $ref: "#/WidgetSettings"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
