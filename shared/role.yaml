Role:
  type: object
  required:
    - id
    - name
    - permissions
    - isStatic
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    permissions:
      type: array
      items:
        type: string
    isStatic:
      type: boolean
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

PermissionItem:
  type: object
  required:
    - id
    - title
    - description
  properties:
    id:
      type: string
    title:
      type: string
    description:
      type: string

PermissionGroup:
  type: object
  required:
    - id
    - title
    - permissions
  properties:
    id:
      type: string
    title:
      type: string
    permissions:
      type: array
      items:
        $ref: '#/PermissionItem'
