MediaItem:
  type: object
  required:
    - type
    - mediaId
  properties:
    type:
      type: string
      enum: [image, video]
    mediaId:
      type: string

MediaVisibility:
  type: string
  enum:
    - PUBLIC
    - PRIVATE

GetMediaUploadUrlInput:
  type: object
  properties:
    contentType:
      type: string
      maxLength: 255

GetMediaUploadUrlResult:
  type: object
  required:
    - bucket
    - objectKey
    - mediaId
    - visibility
    - url
  properties:
    bucket:
      type: string
    objectKey:
      type: string
    mediaId:
      type: string
      minLength: 1
    visibility:
      $ref: "#/MediaVisibility"
    contentType:
      type: string
      maxLength: 255
    url:
      type: string
      format: uri

UploadRequest:
  type: object
  required:
    - name
    - mimeType
  additionalProperties: false
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
    mimeType:
      type: string
      maxLength: 255

UploadRequestResult:
  type: object
  required:
    - fileId
    - uploadUrl
    - uploadFields
  properties:
    fileId:
      type: string
      minLength: 1
    uploadUrl:
      type: string
      format: uri
    uploadFields:
      type: object
      additionalProperties:
        type: string

PreviewDownloadUrlResult:
  type: object
  required:
    - url
  properties:
    url:
      type: string
      format: uri