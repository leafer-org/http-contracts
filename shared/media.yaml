MediaVisibility:
  type: string
  enum:
    - PUBLIC
    - PRIVATE

LinkMediaData:
  type: object
  required:
    - bucket
    - objectKey
    - mediaId
    - visibility
  properties:
    bucket:
      type: string
    objectKey:
      type: string
    mediaId:
      type: string
      minLength: 1
      description: Идентификатор загруженного медиа-объекта
    visibility:
      $ref: "#/MediaVisibility"
    contentType:
      type: string
      maxLength: 255

GetMediaUploadUrlInput:
  type: object
  properties:
    contentType:
      type: string
      maxLength: 255

GetMediaUploadUrlResult:
  type: object
  required:
    - bucket
    - objectKey
    - mediaId
    - visibility
    - url
  properties:
    bucket:
      type: string
    objectKey:
      type: string
    mediaId:
      type: string
      minLength: 1
    visibility:
      $ref: "#/MediaVisibility"
    contentType:
      type: string
      maxLength: 255
    url:
      type: string
      format: uri

UploadRequest:
  type: object
  required:
    - name
    - mimeType
  additionalProperties: false
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
    mimeType:
      type: string
      maxLength: 255

UploadRequestResult:
  type: object
  required:
    - fileId
    - uploadUrl
  properties:
    fileId:
      type: string
      minLength: 1
    uploadUrl:
      type: string
      format: uri

PreviewDownloadUrlResult:
  type: object
  required:
    - url
  properties:
    url:
      type: string
      format: uri