UserSession:
  type: object
  required:
    - id
    - createdAt
    - expiresAt
  additionalProperties: false
  properties:
    id:
      type: string
      format: uuid
      description: Идентификатор сессии
    createdAt:
      type: string
      format: date-time
      description: Дата создания сессии
    expiresAt:
      type: string
      format: date-time
      description: Дата истечения сессии
