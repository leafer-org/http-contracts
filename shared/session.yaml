UserSession:
  type: object
  required:
    - id
    - createdAt
    - expiresAt
  additionalProperties: false
  properties:
    id:
      type: string
      format: uuid
      description: Идентификатор сессии
    createdAt:
      type: string
      format: date-time
      description: Дата создания сессии
    expiresAt:
      type: string
      format: date-time
      description: Дата истечения сессии
    ip:
      type: string
      nullable: true
      description: IP-адрес при создании сессии
    city:
      type: string
      nullable: true
      description: Город по IP-адресу
    country:
      type: string
      nullable: true
      description: Страна по IP-адресу
    deviceName:
      type: string
      nullable: true
      description: Устройство (например "Chrome on macOS")
