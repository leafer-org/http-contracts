PaymentOption:
  type: object
  required:
    - name
    - strategy
  properties:
    name:
      type: string
    description:
      type:
        - string
        - "null"
    strategy:
      type: string
      enum: [free, one-time, subscription]
    price:
      type:
        - number
        - "null"

ItemPayment:
  type: object
  required:
    - options
  properties:
    options:
      type: array
      items:
        $ref: "#/PaymentOption"

ItemOwnerSummary:
  type: object
  required:
    - name
  properties:
    name:
      type: string
    avatarId:
      type:
        - string
        - "null"
    avatarUrl:
      type:
        - string
        - "null"
      format: uri

ItemLocationSummary:
  type: object
  required:
    - cityId
  properties:
    cityId:
      type: string
    address:
      type:
        - string
        - "null"

ItemListView:
  type: object
  required:
    - itemId
    - typeId
    - title
    - hasVideo
    - reviewCount
    - categoryIds
  properties:
    itemId:
      type: string
    typeId:
      type: string
    title:
      type: string
    description:
      type:
        - string
        - "null"
    media:
      type: array
      items:
        $ref: ../shared/media.yaml#/ResolvedMediaItem
    hasVideo:
      type: boolean
    price:
      oneOf:
        - $ref: "#/ItemPayment"
        - type: "null"
    rating:
      type:
        - number
        - "null"
    reviewCount:
      type: integer
    owner:
      oneOf:
        - $ref: "#/ItemOwnerSummary"
        - type: "null"
    location:
      oneOf:
        - $ref: "#/ItemLocationSummary"
        - type: "null"
    categoryIds:
      type: array
      items:
        type: string

LikedItemView:
  allOf:
    - $ref: "#/ItemListView"
    - type: object
      required:
        - likedAt
      properties:
        likedAt:
          type: string
          format: date-time

CursorPaginatedItems:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      items:
        $ref: "#/ItemListView"
    nextCursor:
      type:
        - string
        - "null"

CursorPaginatedLikedItems:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      items:
        $ref: "#/LikedItemView"
    nextCursor:
      type:
        - string
        - "null"

CategoryListItem:
  type: object
  required:
    - categoryId
    - name
    - iconId
    - childCount
    - itemCount
  properties:
    categoryId:
      type: string
    name:
      type: string
    iconId:
      type: string
    childCount:
      type: integer
      minimum: 0
    itemCount:
      type: integer
      minimum: 0

AttributeSchema:
  oneOf:
    - type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text]
    - type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [boolean]
    - type: object
      required: [type, options]
      properties:
        type:
          type: string
          enum: [enum]
        options:
          type: array
          items:
            type: string
    - type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [number]
        min:
          type: number
        max:
          type: number

AttributeFilter:
  type: object
  required:
    - attributeId
    - name
    - schema
  properties:
    attributeId:
      type: string
    name:
      type: string
    schema:
      $ref: "#/AttributeSchema"

TypeFilter:
  type: object
  required:
    - typeId
    - name
  properties:
    typeId:
      type: string
    name:
      type: string

CommonFilters:
  type: object
  required:
    - hasPriceRange
    - hasRating
    - hasLocation
    - hasSchedule
    - hasEventDateTime
  properties:
    hasPriceRange:
      type: boolean
    hasRating:
      type: boolean
    hasLocation:
      type: boolean
    hasSchedule:
      type: boolean
    hasEventDateTime:
      type: boolean

CategoryFilters:
  type: object
  required:
    - categoryId
    - attributeFilters
    - typeFilters
    - commonFilters
  properties:
    categoryId:
      type: string
    attributeFilters:
      type: array
      items:
        $ref: "#/AttributeFilter"
    typeFilters:
      type: array
      items:
        $ref: "#/TypeFilter"
    commonFilters:
      $ref: "#/CommonFilters"

ScheduleEntry:
  type: object
  required:
    - dayOfWeek
    - startTime
    - endTime
  properties:
    dayOfWeek:
      type: integer
    startTime:
      type: string
    endTime:
      type: string

ItemWidgetView:
  oneOf:
    - type: object
      required: [type, title, description, media]
      properties:
        type:
          type: string
          enum: [base-info]
        title:
          type: string
        description:
          type: string
        media:
          type: array
          items:
            $ref: ../shared/media.yaml#/ResolvedMediaItem
    - type: object
      required: [type, value]
      properties:
        type:
          type: string
          enum: [age-group]
        value:
          type: string
          enum: [children, adults, all]
    - type: object
      required: [type, cityId, lat, lng]
      properties:
        type:
          type: string
          enum: [location]
        cityId:
          type: string
        lat:
          type: number
        lng:
          type: number
        address:
          type:
            - string
            - "null"
    - type: object
      required: [type, options]
      properties:
        type:
          type: string
          enum: [payment]
        options:
          type: array
          items:
            $ref: "#/PaymentOption"
    - type: object
      required: [type, categoryIds]
      properties:
        type:
          type: string
          enum: [category]
        categoryIds:
          type: array
          items:
            type: string
    - type: object
      required: [type, organizationId, name]
      properties:
        type:
          type: string
          enum: [owner]
        organizationId:
          type: string
        name:
          type: string
        avatarId:
          type:
            - string
            - "null"
        avatarUrl:
          type:
            - string
            - "null"
          format: uri
    - type: object
      required: [type, reviewCount]
      properties:
        type:
          type: string
          enum: [item-review]
        rating:
          type:
            - number
            - "null"
        reviewCount:
          type: integer
    - type: object
      required: [type, reviewCount]
      properties:
        type:
          type: string
          enum: [owner-review]
        rating:
          type:
            - number
            - "null"
        reviewCount:
          type: integer
    - type: object
      required: [type, dates]
      properties:
        type:
          type: string
          enum: [event-date-time]
        dates:
          type: array
          items:
            $ref: ../shared/cms.yaml#/EventDate
    - type: object
      required: [type, entries]
      properties:
        type:
          type: string
          enum: [schedule]
        entries:
          type: array
          items:
            $ref: "#/ScheduleEntry"
    - type: object
      required: [type, contacts]
      properties:
        type:
          type: string
          enum: [contact-info]
        contacts:
          type: array
          items:
            $ref: ../shared/cms.yaml#/ContactLink
    - type: object
      required: [type, title, members]
      properties:
        type:
          type: string
          enum: [team]
        title:
          type: string
        members:
          type: array
          items:
            $ref: "#/ResolvedTeamMember"
  discriminator:
    propertyName: type

ResolvedTeamMember:
  type: object
  required:
    - name
    - media
  properties:
    name:
      type: string
    description:
      type: string
    media:
      type: array
      items:
        $ref: ../shared/media.yaml#/ResolvedMediaItem
    employeeUserId:
      type: string

ItemDetailView:
  type: object
  required:
    - itemId
    - typeId
    - widgets
    - hasVideo
    - publishedAt
  properties:
    itemId:
      type: string
    typeId:
      type: string
    widgets:
      type: array
      items:
        $ref: "#/ItemWidgetView"
    hasVideo:
      type: boolean
    publishedAt:
      type: string
      format: date-time

SearchFacetCategory:
  type: object
  required:
    - categoryId
    - name
    - count
  properties:
    categoryId:
      type: string
    name:
      type: string
    count:
      type: integer

SearchFacetType:
  type: object
  required:
    - typeId
    - name
    - count
  properties:
    typeId:
      type: string
    name:
      type: string
    count:
      type: integer

SearchFacetAttributeValue:
  type: object
  required:
    - value
    - count
  properties:
    value:
      type: string
    count:
      type: integer

SearchFacetAttribute:
  type: object
  required:
    - attributeId
    - name
    - values
  properties:
    attributeId:
      type: string
    name:
      type: string
    values:
      type: array
      items:
        $ref: "#/SearchFacetAttributeValue"

SearchFacets:
  type: object
  required:
    - categories
    - types
    - attributes
  properties:
    categories:
      type: array
      items:
        $ref: "#/SearchFacetCategory"
    types:
      type: array
      items:
        $ref: "#/SearchFacetType"
    priceRange:
      oneOf:
        - type: object
          required: [min, max]
          properties:
            min:
              type: number
            max:
              type: number
        - type: "null"
    attributes:
      type: array
      items:
        $ref: "#/SearchFacetAttribute"
