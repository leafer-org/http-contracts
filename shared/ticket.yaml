TicketListItem:
  type: object
  required:
    - ticketId
    - boardId
    - message
    - status
    - createdAt
    - updatedAt
  properties:
    ticketId:
      type: string
    boardId:
      type: string
    message:
      type: string
    triggerId:
      type:
        - string
        - "null"
    status:
      type: string
      enum:
        - open
        - in-progress
        - done
    assigneeId:
      type:
        - string
        - "null"
    data:
      $ref: "#/TicketData"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

TicketDetail:
  type: object
  required:
    - ticketId
    - boardId
    - message
    - data
    - status
    - history
    - createdAt
    - updatedAt
  properties:
    ticketId:
      type: string
    boardId:
      type: string
    message:
      type: string
    triggerId:
      type:
        - string
        - "null"
    eventId:
      type:
        - string
        - "null"
    data:
      $ref: "#/TicketData"
    status:
      type: string
      enum:
        - open
        - in-progress
        - done
    assigneeId:
      type:
        - string
        - "null"
    history:
      type: array
      items:
        $ref: "#/TicketHistoryEntry"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

TicketData:
  type: object
  properties:
    item:
      type:
        - object
        - "null"
      properties:
        id:
          type: string
        organizationId:
          type: string
        typeId:
          type: string
        title:
          type: string
        description:
          type: string
        imageUrl:
          type:
            - string
            - "null"
        categoryIds:
          type: array
          items:
            type: string
    organization:
      type:
        - object
        - "null"
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        avatarUrl:
          type:
            - string
            - "null"

TicketDataInput:
  type: object
  properties:
    item:
      type:
        - object
        - "null"
      properties:
        id:
          type: string
        organizationId:
          type: string
        typeId:
          type: string
        title:
          type: string
        description:
          type: string
        imageId:
          type:
            - string
            - "null"
        categoryIds:
          type: array
          items:
            type: string
    organization:
      type:
        - object
        - "null"
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        avatarId:
          type:
            - string
            - "null"

TicketHistoryEntry:
  type: object
  required:
    - action
    - actorId
    - data
    - timestamp
  properties:
    action:
      type: string
      enum:
        - created
        - assigned
        - reassigned
        - unassigned
        - moved
        - done
        - reopened
        - commented
    actorId:
      type: string
    data:
      type: object
      additionalProperties: true
    timestamp:
      type: string
      format: date-time

BoardListItem:
  type: object
  required:
    - boardId
    - name
    - scope
    - manualCreation
    - subscriptionCount
    - memberCount
    - automationCount
    - createdAt
  properties:
    boardId:
      type: string
    name:
      type: string
    description:
      type:
        - string
        - "null"
    scope:
      type: string
      enum:
        - platform
        - organization
    manualCreation:
      type: boolean
    subscriptionCount:
      type: integer
    memberCount:
      type: integer
    automationCount:
      type: integer
    createdAt:
      type: string
      format: date-time

BoardDetail:
  type: object
  required:
    - boardId
    - name
    - scope
    - manualCreation
    - subscriptions
    - allowedTransferBoardIds
    - memberIds
    - automations
    - createdAt
    - updatedAt
  properties:
    boardId:
      type: string
    name:
      type: string
    description:
      type:
        - string
        - "null"
    scope:
      type: string
      enum:
        - platform
        - organization
    organizationId:
      type:
        - string
        - "null"
    manualCreation:
      type: boolean
    subscriptions:
      type: array
      items:
        $ref: "#/BoardSubscription"
    allowedTransferBoardIds:
      type: array
      items:
        type: string
    memberIds:
      type: array
      items:
        type: string
    members:
      type: array
      items:
        $ref: "#/BoardMember"
    automations:
      type: array
      items:
        $ref: "#/BoardAutomation"
    closeSubscriptions:
      type: array
      items:
        $ref: "#/CloseSubscription"
    redirectSubscriptions:
      type: array
      items:
        $ref: "#/RedirectSubscription"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

BoardSubscription:
  type: object
  required:
    - id
    - triggerId
    - filters
  properties:
    id:
      type: string
    triggerId:
      type: string
    filters:
      type: array
      items:
        $ref: "#/SubscriptionFilter"

BoardAutomation:
  type: object
  required:
    - id
    - enabled
    - agentId
    - systemPrompt
    - onUncertain
  properties:
    id:
      type: string
    enabled:
      type: boolean
    agentId:
      type: string
    systemPrompt:
      type: string
    onUncertain:
      type: object
      required:
        - moveToBoardId
      properties:
        moveToBoardId:
          type:
            - string
            - "null"

BoardMember:
  type: object
  required:
    - userId
    - fullName
    - phone
    - role
  properties:
    userId:
      type: string
    fullName:
      type: string
    phone:
      type: string
    role:
      type: string

CloseSubscription:
  type: object
  required:
    - id
    - triggerId
    - filters
    - addComment
  properties:
    id:
      type: string
    triggerId:
      type: string
    filters:
      type: array
      items:
        $ref: "#/SubscriptionFilter"
    addComment:
      type: boolean

RedirectSubscription:
  type: object
  required:
    - id
    - triggerId
    - filters
    - targetBoardId
    - addComment
    - commentTemplate
  properties:
    id:
      type: string
    triggerId:
      type: string
    filters:
      type: array
      items:
        $ref: "#/SubscriptionFilter"
    targetBoardId:
      type: string
    addComment:
      type: boolean
    commentTemplate:
      type: string

SubscriptionFilter:
  oneOf:
    - type: object
      required:
        - type
        - rule
      properties:
        type:
          type: string
          enum:
            - json-logic
        rule:
          type: object
          additionalProperties: true
    - type: object
      required:
        - type
        - n
      properties:
        type:
          type: string
          enum:
            - every-nth
        n:
          type: integer
    - type: object
      required:
        - type
        - percent
      properties:
        type:
          type: string
          enum:
            - random-sample
        percent:
          type: number
  discriminator:
    propertyName: type

TriggerInfo:
  type: object
  required:
    - triggerId
    - name
    - categories
    - params
  properties:
    triggerId:
      type: string
    name:
      type: string
    categories:
      type: array
      items:
        type: string
        enum:
          - open
          - close
          - redirect
    params:
      type: array
      items:
        $ref: "#/TriggerParam"

TriggerParam:
  type: object
  required:
    - key
    - label
    - type
  properties:
    key:
      type: string
    label:
      type: string
    type:
      type: string
      enum:
        - number
        - string

FilterInfo:
  type: object
  required:
    - type
    - name
    - categories
    - params
  properties:
    type:
      type: string
    name:
      type: string
    categories:
      type: array
      items:
        type: string
        enum:
          - open
          - close
          - redirect
    params:
      type: array
      items:
        $ref: "#/TriggerParam"
