DomainErrorResponse:
  type: object
  required:
    - type
    - isDomain
  properties:
    type:
      type: string
      description: Код ошибки для обработки на клиенте
    message:
      type: string
      description: Человекочитаемое описание ошибки
    isDomain:
      type: boolean
      enum: 
       - true
    data:
      type: object
      additionalProperties: true
      description: Дополнительные детали ошибки

ThrottledErrorResponse:
  type: object
  required:
    - type
    - isDomain
    - data
  properties:
    type:
      type: string
      enum:
        - throttled
    isDomain:
      type: boolean
      enum: 
       - true
    message:
      type: string
    data:
      type: object
      required:
       - retryAfterSec
      properties:
        retryAfterSec:
          type: number
          minimum: 1
          description: Рекомендованная задержка перед повторной попыткой

OpenApiValidationError:
  type: object
  required:
    - statusCode
    - message
    - errors
    - isDomain
  properties:
    statusCode:
      type: integer
      description: HTTP код ответа
    isDomain:
      type: boolean
      enum:
       - false
    message:
      type: string
      description: Человекочитаемое описание ошибки
    errors:
      type: array
      items:
        $ref: "#/ErrorDetail"

ErrorDetail:
  type: object
  required:
    - errorCode
    - message
    - path
  properties:
    errorCode:
      type: string
      description: Код ошибки для обработки на клиенте
    message:
      type: string
      description: Человекочитаемое описание ошибки
    path:
      type: string
      description: Путь к полю с ошибкой
    data:
      type: object
      additionalProperties: true
      description: Дополнительные детали ошибки

OpenApiErrorResponse:
  content:
    'application/json':
      $ref: '#/OpenApiValidationError'
  

