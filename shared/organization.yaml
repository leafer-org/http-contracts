OrganizationPermission:
  type: string
  enum:
    - manage_employees
    - manage_roles
    - edit_organization
    - publish_organization
    - edit_items
    - publish_items
    - unpublish_items
    - manage_subscription

SubscriptionPlanId:
  type: string
  enum:
    - free
    - individual
    - team

InfoDraftStatus:
  type: string
  enum:
    - draft
    - moderation-request
    - rejected

ItemDraftStatus:
  type: string
  enum:
    - draft
    - moderation-request
    - rejected

# ── Organization ──────────────────────────────────────

OrganizationDetail:
  type: object
  required:
    - id
    - infoDraft
    - employees
    - roles
    - subscription
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    infoDraft:
      $ref: "#/InfoDraft"
    infoPublication:
      type:
        - object
        - "null"
      required:
        - name
        - description
        - media
        - publishedAt
      properties:
        name:
          type: string
        description:
          type: string
        avatarId:
          type:
            - string
            - "null"
        media:
          type: array
          items:
            $ref: ../shared/media.yaml#/ResolvedMediaItem
        contacts:
          type: array
          items:
            $ref: ../shared/cms.yaml#/ContactLink
        team:
          type: object
          properties:
            title:
              type: string
            members:
              type: array
              items:
                $ref: ../shared/cms.yaml#/TeamMember
        publishedAt:
          type: string
          format: date-time
    employees:
      type: array
      items:
        $ref: "#/Employee"
    roles:
      type: array
      items:
        $ref: "#/EmployeeRole"
    subscription:
      $ref: "#/Subscription"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

InfoDraft:
  type: object
  required:
    - name
    - description
    - media
    - status
    - updatedAt
    - hasDraftChanges
    - canSubmitForModeration
  properties:
    name:
      type: string
    description:
      type: string
    avatarId:
      type:
        - string
        - "null"
    media:
      type: array
      items:
        $ref: ../shared/media.yaml#/ResolvedMediaItem
    contacts:
      type: array
      items:
        $ref: ../shared/cms.yaml#/ContactLink
    team:
      type: object
      properties:
        title:
          type: string
        members:
          type: array
          items:
            $ref: ../shared/cms.yaml#/TeamMember
    status:
      $ref: "#/InfoDraftStatus"
    updatedAt:
      type: string
      format: date-time
    hasDraftChanges:
      type: boolean
    canSubmitForModeration:
      type: boolean

# ── My Organizations ───────────────────────────────

OrganizationListItem:
  type: object
  required:
    - id
    - name
    - description
    - avatarUrl
    - isOwner
    - isPublished
    - draftStatus
    - updatedAt
  properties:
    id:
      type: string
    name:
      type: string
    description:
      type: string
    avatarUrl:
      type:
        - string
        - "null"
    isOwner:
      type: boolean
    isPublished:
      type: boolean
    draftStatus:
      $ref: "#/InfoDraftStatus"
    updatedAt:
      type: string
      format: date-time

# ── Employees ──────────────────────────────────────

Employee:
  type: object
  required:
    - userId
    - roleId
    - isOwner
    - joinedAt
  properties:
    userId:
      type: string
    roleId:
      type: string
    isOwner:
      type: boolean
    joinedAt:
      type: string
      format: date-time

# ── Roles ──────────────────────────────────────────

EmployeeRole:
  type: object
  required:
    - id
    - name
    - permissions
  properties:
    id:
      type: string
    name:
      type: string
    permissions:
      type: array
      items:
        $ref: "#/OrganizationPermission"

# ── Subscription ───────────────────────────────────

Subscription:
  type: object
  required:
    - planId
    - maxEmployees
    - maxPublishedItems
    - availableWidgetTypes
  properties:
    planId:
      $ref: "#/SubscriptionPlanId"
    maxEmployees:
      type: integer
    maxPublishedItems:
      type: integer
    availableWidgetTypes:
      type: array
      items:
        $ref: ../shared/cms.yaml#/WidgetType

# ── Items ──────────────────────────────────────────

ItemWidget:
  oneOf:
    - type: object
      required: [type, title, description, media]
      properties:
        type:
          type: string
          enum: [base-info]
        title:
          type: string
        description:
          type: string
        media:
          type: array
          items:
            $ref: ../shared/media.yaml#/MediaItem
    - type: object
      required: [type, value]
      properties:
        type:
          type: string
          enum: [age-group]
        value:
          type: string
          enum: [children, adults, all]
    - type: object
      required: [type, cityId, lat, lng]
      properties:
        type:
          type: string
          enum: [location]
        cityId:
          type: string
        lat:
          type: number
        lng:
          type: number
        address:
          type:
            - string
            - "null"
    - type: object
      required: [type, options]
      properties:
        type:
          type: string
          enum: [payment]
        options:
          type: array
          items:
            $ref: ../shared/discovery.yaml#/PaymentOption
    - type: object
      required: [type, categoryIds]
      properties:
        type:
          type: string
          enum: [category]
        categoryIds:
          type: array
          items:
            type: string
        attributes:
          type: array
          items:
            type: object
            required: [attributeId, value]
            properties:
              attributeId:
                type: string
              value:
                type: string
    - type: object
      required: [type, organizationId, name]
      properties:
        type:
          type: string
          enum: [owner]
        organizationId:
          type: string
        name:
          type: string
        avatarId:
          type:
            - string
            - "null"
    - type: object
      required: [type, reviewCount]
      properties:
        type:
          type: string
          enum: [item-review]
        rating:
          type:
            - number
            - "null"
        reviewCount:
          type: integer
    - type: object
      required: [type, reviewCount]
      properties:
        type:
          type: string
          enum: [owner-review]
        rating:
          type:
            - number
            - "null"
        reviewCount:
          type: integer
    - type: object
      required: [type, dates]
      properties:
        type:
          type: string
          enum: [event-date-time]
        dates:
          type: array
          items:
            $ref: ../shared/cms.yaml#/EventDate
    - type: object
      required: [type, entries]
      properties:
        type:
          type: string
          enum: [schedule]
        entries:
          type: array
          items:
            $ref: ../shared/discovery.yaml#/ScheduleEntry
    - type: object
      required: [type, contacts]
      properties:
        type:
          type: string
          enum: [contact-info]
        contacts:
          type: array
          items:
            $ref: ../shared/cms.yaml#/ContactLink
    - type: object
      required: [type, title, members]
      properties:
        type:
          type: string
          enum: [team]
        title:
          type: string
        members:
          type: array
          items:
            $ref: ../shared/cms.yaml#/TeamMember
  discriminator:
    propertyName: type

# Input widgets (from frontend) — without auto-filled widgets (owner, item-review, owner-review)
ItemWidgetInput:
  oneOf:
    - type: object
      required: [type, title, description, media]
      properties:
        type:
          type: string
          enum: [base-info]
        title:
          type: string
        description:
          type: string
        media:
          type: array
          items:
            $ref: ../shared/media.yaml#/MediaItem
    - type: object
      required: [type, value]
      properties:
        type:
          type: string
          enum: [age-group]
        value:
          type: string
          enum: [children, adults, all]
    - type: object
      required: [type, cityId, lat, lng]
      properties:
        type:
          type: string
          enum: [location]
        cityId:
          type: string
        lat:
          type: number
        lng:
          type: number
        address:
          type:
            - string
            - "null"
    - type: object
      required: [type, options]
      properties:
        type:
          type: string
          enum: [payment]
        options:
          type: array
          items:
            $ref: ../shared/discovery.yaml#/PaymentOption
    - type: object
      required: [type, categoryIds]
      properties:
        type:
          type: string
          enum: [category]
        categoryIds:
          type: array
          items:
            type: string
        attributes:
          type: array
          items:
            type: object
            required: [attributeId, value]
            properties:
              attributeId:
                type: string
              value:
                type: string
    - type: object
      required: [type, dates]
      properties:
        type:
          type: string
          enum: [event-date-time]
        dates:
          type: array
          items:
            $ref: ../shared/cms.yaml#/EventDate
    - type: object
      required: [type, entries]
      properties:
        type:
          type: string
          enum: [schedule]
        entries:
          type: array
          items:
            $ref: ../shared/discovery.yaml#/ScheduleEntry
    - type: object
      required: [type, contacts]
      properties:
        type:
          type: string
          enum: [contact-info]
        contacts:
          type: array
          items:
            $ref: ../shared/cms.yaml#/ContactLink
    - type: object
      required: [type, title, members]
      properties:
        type:
          type: string
          enum: [team]
        title:
          type: string
        members:
          type: array
          items:
            $ref: ../shared/cms.yaml#/TeamMember
  discriminator:
    propertyName: type

ItemDraft:
  type: object
  required:
    - widgets
    - status
    - updatedAt
  properties:
    widgets:
      type: array
      items:
        $ref: "#/ItemWidget"
    status:
      $ref: "#/ItemDraftStatus"
    updatedAt:
      type: string
      format: date-time

ItemPublication:
  type: object
  required:
    - widgets
    - publishedAt
  properties:
    widgets:
      type: array
      items:
        $ref: "#/ItemWidget"
    publishedAt:
      type: string
      format: date-time

ItemListItem:
  type: object
  required:
    - itemId
    - organizationId
    - typeId
    - createdAt
    - updatedAt
  properties:
    itemId:
      type: string
    organizationId:
      type: string
    typeId:
      type: string
    hasDraft:
      type: boolean
    draftStatus:
      type:
        - string
        - "null"
    hasPublication:
      type: boolean
    widgets:
      type: array
      items:
        $ref: "#/ItemWidget"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

ItemDetail:
  type: object
  required:
    - itemId
    - organizationId
    - typeId
    - createdAt
    - updatedAt
  properties:
    itemId:
      type: string
    organizationId:
      type: string
    typeId:
      type: string
    draft:
      type:
        - object
        - "null"
      required:
        - widgets
        - status
        - updatedAt
      properties:
        widgets:
          type: array
          items:
            $ref: "#/ItemWidget"
        status:
          $ref: "#/ItemDraftStatus"
        updatedAt:
          type: string
          format: date-time
    publication:
      type:
        - object
        - "null"
      required:
        - widgets
        - publishedAt
      properties:
        widgets:
          type: array
          items:
            $ref: "#/ItemWidget"
        publishedAt:
          type: string
          format: date-time
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
